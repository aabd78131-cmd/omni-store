<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; width: 100%; height: 100%; }

        /* --- الهيدر (التوزيع المطلوب) --- */
        header {
            position: fixed; top: 10px; left: 2.5%; width: 95%; height: 65px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        
        .header-right { flex: 1; display: flex; justify-content: flex-start; }
        .header-center { flex: 2; display: flex; justify-content: center; align-items: center; }
        .header-left { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }

        .header-title { color: #d4af37; font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .saudi-flag { width: 24px; }

        .nav-icon { font-size: 28px; color: #d4af37; cursor: pointer; transition: 0.3s; }
        .back-btn { font-size: 28px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { 
            position: absolute; top: -5px; right: -8px; background: #ff0000; 
            color: white; font-size: 11px; width: 20px; height: 20px; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-weight: bold; border: 1px solid #000;
        }

        /* --- القائمة الجانبية --- */
        #side-menu { 
            position: fixed; top: 0; right: -100%; width: 85%; height: 100vh; 
            background: #050505; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 40px 20px; border-left: 2px solid #d4af37; 
        }
        #side-menu.active { right: 0; }
        .menu-logo-container { 
            width: 110px; height: 110px; margin: 0 auto 30px; 
            border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; 
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }
        .menu-item { 
            padding: 18px; border-bottom: 1px solid #1a1a1a; 
            display: flex; align-items: center; gap: 15px; font-size: 1.1rem;
            cursor: pointer; transition: 0.2s;
        }
        .menu-item:active { background: #111; color: #d4af37; }

        /* --- المحتوى الرئيسي --- */
        #main-content { padding-top: 100px; }
        .hero-banner { 
            width: 95%; margin: 0 auto 25px; display: block; 
            border-radius: 20px; border: 1px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .container { padding: 0 15px 60px; }
        .cat-item { margin-bottom: 25px; text-align: center; cursor: pointer; }
        .cat-item img { 
            width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; 
            aspect-ratio: 16/9; object-fit: cover; transition: 0.3s;
        }
        .cat-label { color: #d4af37; font-weight: 900; margin-top: 12px; font-size: 1.2rem; }

        /* --- صفحة المنتجات --- */
        #section-view { display: none; padding: 110px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { 
            background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 18px; 
            padding: 12px; text-align: center; position: relative;
        }
        .product-card img { width: 100%; border-radius: 12px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 10px; }
        .product-card h3 { font-size: 0.9rem; margin-bottom: 5px; height: 40px; overflow: hidden; }

        /* --- النافذة المنبثقة (Modals) --- */
        .modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            max-height: 92vh; background: #080808; z-index: 3000; 
            border-top: 3px solid #d4af37; border-radius: 30px 30px 0 0; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 30px 20px; overflow-y: auto; 
        }
        .modal.active { bottom: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.85); z-index: 1500; display: none; backdrop-filter: blur(5px); }

        .btn-main { 
            background: linear-gradient(90deg, #d4af37, #f2d06b); color: #000; 
            border: none; padding: 18px; width: 100%; border-radius: 15px; 
            font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 15px;
        }
        
        .steam-instructions-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .steam-instructions-grid img { width: 100%; border-radius: 12px; border: 1px solid #333; }

        .variant-box { background: #111; padding: 15px; border-radius: 15px; margin: 15px 0; border: 1px solid #222; }
    </style>
</head>
<body>

    <header>
        <div class="header-right"><div class="nav-icon" onclick="toggleMenu()">&#8942;</div></div>
        <div class="header-center">
            <div class="header-title">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
                متجر أومني
            </div>
        </div>
        <div class="header-left">
            <div class="cart-wrapper" onclick="toggleCart()" style="position:relative;">
                <div class="nav-icon">🛒</div>
                <div class="cart-badge" id="cart-count">0</div>
            </div>
            <div class="back-btn" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.jpeg" class="menu-logo"></div>
        <div class="menu-item" onclick="goHome(); closeAll();">🏠 الرئيسية</div>
        <div class="menu-item" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</div>
        <div class="menu-item" onclick="openSection('قسم الترفيه'); closeAll();">🍿 قسم الترفيه</div>
        <div class="menu-item" onclick="window.open('https://wa.me/966548512295')">💬 تواصل مع الدعم</div>
        <div style="margin-top: 50px; text-align: center; color: #444; font-size: 0.8rem;">OMNI STORE v2.5</div>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.jpeg"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item" onclick="openSection('قسم انستا')"><img src="قسم انستا .jpeg"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .jpeg"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item" onclick="openSection('الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي.jpeg"><div class="cat-label">ذكاء اصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="section-title" style="color:#d4af37; margin-bottom:20px; text-align:center;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <div id="product-detail-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left; font-size:24px;">✕</div>
        <div id="detail-content"></div>
    </div>
    
    <div id="cart-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left; font-size:24px;">✕</div>
        <h2 style="color:#d4af37; margin-bottom:25px; border-bottom:1px solid #222; padding-bottom:10px;">سلة المشتريات</h2>
        <div id="cart-items"></div>
        <div id="cart-total" style="margin:20px 0; font-weight:bold; font-size:1.2rem; text-align:left;"></div>
        <button class="btn-main" onclick="checkout()">إرسال الطلب عبر واتساب</button>
    </div>

    <script>
        const storeData = {
            'قسم ستيم أوفلاين': [
                {
                    id: 'steam_cinema',
                    name: 'Cinema Simulator 2025 (Steam Offline)',
                    price: 15,
                    img: 'منتج لعبه  اوفلاين Cinema Simulator 2025.jpg', // تم التأكد من المسافات
                    desc: `لعبة أوفلاين كاملة من ستيم. حساب مشترك بختمة خاصة بك.<br><br>
                    <b style="color:#d4af37">طريقة التفعيل (شرح بالصور):</b><br>
                    <div class="steam-instructions-grid">
                        <img src="ستيم 1 .jpeg">
                        <img src="سستيم 2 .jpeg">
                        <img src="ستيم 3 .jpeg">
                        <img src="ستيم 4 .jpeg">
                        <img src="ستيم 5 .jpeg">
                    </div>`
                }
            ],
            'قسم الترفيه': [
                { id: 'yt_prem', name: 'يوتيوب بريميوم', price: '12', img: 'قسم اشتراكات الترفيه.jpeg', variants: [{n: 'شهر شخصي', p: 12}, {n: '3 شهور شخصي', p: 30}] }
            ],
            'قسم انستا': [
                { id: 'ig_fol', name: 'زيادة متابعين انستقرام', price: '7', img: 'قسم انستا .jpeg', variants: [{n: '1000 متابع', p: 7}, {n: '5000 متابع', p: 30}] }
            ],
            'قسم تيك توك': [
                { id: 'tk_fol', name: 'متابعين تيك توك', price: '10', img: 'قسم تيك توك .jpeg', variants: [{n: '1000 متابع', p: 10}] }
            ],
            'الذكاء الاصطناعي': [
                { id: 'gpt_plus', name: 'ChatGPT Plus', price: '45', img: 'قسم الذكاء الاصطناعي.jpeg', variants: [{n: 'اشتراك شهر', p: 45}] }
            ]
        };

        let cart = [];

        function openSection(name) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('section-title').innerText = name;
            
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            
            if(storeData[name]) {
                storeData[name].forEach(p => {
                    list.innerHTML += `
                        <div class="product-card" onclick="showProductDetails('${name}', '${p.id}')">
                            <img src="${p.img}">
                            <h3>${p.name}</h3>
                            <div style="color:#d4af37; font-weight:bold;">${p.price} ريال</div>
                        </div>`;
                });
            }
            window.scrollTo(0,0);
        }

        function showProductDetails(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            const content = document.getElementById('detail-content');
            let varHtml = '';
            
            if(p.variants) {
                varHtml = `<div class="variant-box"><h3>اختر الباقة:</h3>`;
                p.variants.forEach((v, idx) => {
                    varHtml += `
                        <label style="display:flex; align-items:center; gap:10px; margin:15px 0; background:#000; padding:10px; border-radius:10px; border:1px solid #333;">
                            <input type="radio" name="pv" value="${v.n}" data-p="${v.p}" ${idx===0?'checked':''}>
                            <span>${v.n} - ${v.p} ريال</span>
                        </label>`;
                });
                varHtml += `</div>`;
            }

            content.innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:20px; margin-bottom:15px; border:1px solid #222;">
                <h2 style="color:#d4af37;">${p.name}</h2>
                <div style="margin:15px 0; line-height:1.6; color:#ddd;">${p.desc || 'منتج رقمي عالي الجودة متوفر الآن.'}</div>
                ${varHtml}
                <button class="btn-main" onclick="addToCart('${cat}','${id}')">إضافة إلى السلة</button>
            `;
            
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function addToCart(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            let finalName = p.name;
            let finalPrice = p.price;

            if(p.variants) {
                const selected = document.querySelector('input[name="pv"]:checked');
                finalName += " - " + selected.value;
                finalPrice = selected.dataset.p;
            }

            cart.push({ name: finalName, price: parseFloat(finalPrice) });
            updateCartBadge();
            closeAll();
        }

        function updateCartBadge() {
            document.getElementById('cart-count').innerText = cart.length;
        }

        function toggleCart() {
            const list = document.getElementById('cart-items');
            const totalDiv = document.getElementById('cart-total');
            list.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += item.price;
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid #1a1a1a;">
                        <div>
                            <div style="font-weight:bold;">${item.name}</div>
                            <div style="color:#d4af37; font-size:0.9rem;">${item.price} ريال</div>
                        </div>
                        <div onclick="removeFromCart(${index})" style="color:red; cursor:pointer;">حذف</div>
                    </div>`;
            });

            totalDiv.innerText = `المجموع الإجمالي: ${total} ريال`;
            document.getElementById('cart-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartBadge();
            toggleCart();
        }

        function checkout() {
            if(cart.length === 0) return alert('السلة فارغة!');
            let message = `*طلب جديد من متجر أومني*\n------------------------\n`;
            let total = 0;
            cart.forEach((item, idx) => {
                message += `${idx + 1}. ${item.name} | ${item.price} ريال\n`;
                total += item.price;
            });
            message += `------------------------\n*الإجمالي: ${total} ريال*`;
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(message)}`);
        }

        function goHome() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
        }

        function toggleMenu() {
            document.getElementById('side-menu').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
