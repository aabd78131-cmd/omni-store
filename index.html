<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni Store | متجر أومني</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; }
        
        /* واجهة التسجيل */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex;
            align-items: center; justify-content: center;
        }
        .login-box {
            background: #111; padding: 30px; border-radius: 20px;
            border: 1px solid #c7a13c; width: 85%; max-width: 350px; text-align: center;
        }
        .login-box h2 { color: #c7a13c; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; background: #000;
            border: 1px solid #333; color: #fff; border-radius: 8px; text-align: center;
            box-sizing: border-box;
        }
        button {
            width: 100%; padding: 12px; background: #c7a13c; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-box">
            <h2>أهلاً بك في أومني</h2>
            <p style="font-size: 14px; color: #888;">سجل دخولك للمتابعة</p>
            <input type="text" id="userName" placeholder="الاسم الكريم">
            <input type="tel" id="userPhone" placeholder="رقم الجوال (05xxxxxxx)">
            <button onclick="loginToOmni()">دخول للمتجر</button>
        </div>
    </div>

    <div id="storeContent" style="display:none; padding: 20px; text-align: center;">
        <h1 style="color: #c7a13c;">متجر أومني للاشتراكات</h1>
        <p>مرحباً بك مجدداً! جاري تحميل المنتجات...</p>
    </div>

    <script>
        // 1. إعدادات Firebase الخاصة بمشروعك OmniStore
        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.firebasestorage.app",
            appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 2. دالة تسجيل الدخول وحفظ البيانات
        function loginToOmni() {
            const name = document.getElementById('userName').value;
            const phone = document.getElementById('userPhone').value;

            if (name.length < 3 || phone.length < 10) {
                alert("يرجى إدخال اسمك ورقم جوالك بشكل صحيح");
                return;
            }

            // حفظ البيانات في Realtime Database
            db.ref('customers/' + phone).set({
                name: name,
                phone: phone,
                date: new Date().toLocaleString()
            }).then(() => {
                // حفظ الحالة في المتصفح لعدم طلب التسجيل مرة أخرى
                localStorage.setItem('omni_customer', JSON.stringify({name, phone}));
                showStore();
            }).catch((error) => {
                alert("خطأ في الاتصال: " + error.message);
            });
        }

        // 3. دالة إظهار المتجر
        function showStore() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('storeContent').style.display = 'block';
        }

        // 4. التحقق عند فتح الصفحة
        window.onload = function() {
            if (localStorage.getItem('omni_customer')) {
                showStore();
            }
        };
    </script>
</body>
</html>
