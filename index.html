<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .ripple { position: relative; overflow: hidden; }
        .ripple:active:after { content: ""; position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: rgba(255,255,255,0.2); border-radius: 50%; transform: scale(0); animation: ripple-animation 0.5s linear; }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        /* --- الهيدر المطور (توزيع العناصر حسب طلبك) --- */
        header {
            position: fixed; top: 10px; left: 2.5%; width: 95%; height: 60px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        
        /* اليمين: المنيو */
        .header-right { flex: 1; display: flex; justify-content: flex-start; }
        
        /* المنتصف: العنوان */
        .header-center { flex: 2; display: flex; justify-content: center; align-items: center; }
        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; white-space: nowrap; }
        .saudi-flag { width: 22px; }

        /* اليسار: السلة والرجوع */
        .header-left { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }

        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 11px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* --- القوائم والمنتجات --- */
        #side-menu { position: fixed; top: 0; right: -100%; width: 80%; height: 100vh; background: rgba(5, 5, 5, 0.98); z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37; }
        #side-menu.active { right: 0; }
        .menu-logo-container { width: 90px; height: 90px; margin: 0 auto 20px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }

        #main-content { padding-top: 100px; }
        .hero-banner { width: 92%; margin: 0 auto 30px; display: block; border-radius: 20px; border: 1px solid #222; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 25px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.1rem; }

        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }

        /* --- النوافذ --- */
        .modal { position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh; background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37; border-radius: 25px 25px 0 0; transition: 0.4s; padding: 25px 20px; overflow-y: auto; }
        .modal.active { bottom: 0; }
        .variant-box { background: #111; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .custom-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Cairo'; }
        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1rem; cursor: pointer; }
        .steam-instructions img { width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid #333; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-right">
            <div class="nav-icon ripple" onclick="toggleMenu()">&#8942;</div>
        </div>

        <div class="header-center">
            <div class="header-title">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
                متجر أومني
            </div>
        </div>

        <div class="header-left">
            <div class="cart-wrapper ripple" onclick="toggleCart()" style="position:relative;">
                <div class="nav-icon">🛒</div>
                <div class="cart-badge" id="cart-count">0</div>
            </div>
            <div class="back-btn ripple" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.jpeg" class="menu-logo"></div>
        <ul style="list-style:none;">
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="goHome(); closeAll();">🏠 الرئيسية</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الترفيه'); closeAll();">🍿 قسم الترفيه</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم انستا'); closeAll();">📸 قسم انستقرام</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم تيك توك'); closeAll();">📱 قسم تيك توك</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الذكاء الاصطناعي'); closeAll();">🤖 الذكاء الاصطناعي</li>
        </ul>
    </div>

    <div id="product-detail-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <div id="detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <h2 style="color:#d4af37; margin-bottom:20px;">السلة</h2>
        <div id="cart-items"></div>
        <div style="margin:20px 0; font-size:1.2rem; color:#d4af37; font-weight:bold;">المجموع: <span id="cart-total">0</span> ريال</div>
        <button class="btn-main ripple" onclick="checkout()">تأكيد الطلب</button>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item ripple" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.jpeg"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم انستا')"><img src="قسم انستا .jpeg"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .jpeg"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <div class="product-grid" id="products-list"></div>
    </div>

    <script>
        const storeData = {
            'قسم الترفيه': [{ id: 'ytp', name: 'يوتيوب بريميوم', price: '11.99', img: 'قسم اشتراكات الترفيه.jpeg', desc: 'اشتراك يوتيوب بريميوم رسمي في حسابك.', variants: [{n: 'شهر', p: 11.99}, {n: 'شهرين', p: 20.99}, {n: '3 شهور', p: 26.99}, {n: '4 شهور', p: 34.99}, {n: '5 شهور', p: 40.99}, {n: '6 شهور', p: 45.99}] }],
            'قسم انستا': [
                { id: 'igv', name: 'مشاهدات انستا', price: '5', img: 'قسم انستا .jpeg', variants: [{n: '1000 مشاهدة', p: 5}, {n: '3000 مشاهدة', p: 8}, {n: '6000 مشاهدة', p: 11}, {n: '10000 مشاهدة', p: 15}], allowCustom: true },
                { id: 'igf', name: 'متابعين انستا', price: '6', img: 'قسم انستا .jpeg', variants: [{n: '1000 متابع', p: 6}, {n: '3000 متابع', p: 14}, {n: '6000 متابع', p: 24}, {n: '10000 متابع', p: 34}], allowCustom: true }
            ],
            'قسم تيك توك': [
                { id: 'tkv', name: 'مشاهدات تيك توك', price: '5', img: 'قسم تيك توك .jpeg', variants: [{n: '1000 مشاهدة', p: 5}, {n: '3000 مشاهدة', p: 8}, {n: '6000 مشاهدة', p: 11}, {n: '10000 مشاهدة', p: 15}], allowCustom: true },
                { id: 'tkf', name: 'متابعين تيك توك', price: '10', img: 'قسم تيك توك .jpeg', variants: [{n: '1000 متابع', p: 10}, {n: '3000 متابع', p: 20}, {n: '6000 متابع', p: 34}, {n: '10000 متابع', p: 55}], allowCustom: true }
            ],
            'قسم ستيم أوفلاين': [{
                id: 'cs25', name: 'Cinema Simulator 2025', price: 15, 
                img: 'منتج لعبه اوفلاين Cinema Simulator 2025.jpg', 
                desc: `اللعبه نظاميه من ستيم. كل زبون له تختيمه الخاص.<br><br>
                <b>تنبيه: تأكد أن الحساب أوفلاين.</b><br><br>
                <div class="steam-instructions">
                    <img src="ستيم 1 .jpeg"> <img src="سستيم 2 .jpeg"> <img src="ستيم 3 .jpeg"> <img src="ستيم 4 .jpeg"> <img src="ستيم 5 .jpeg">
                </div>`
            }],
            'قسم الذكاء الاصطناعي': [
                { id: 'gpt', name: 'شات جي بي تي', price: 12.99, img: 'قسم الذكاء الاصطناعي .jpeg', desc: 'حساب مشترك. عدم تغيير البيانات.' },
                { id: 'canva', name: 'كانفا 12 شهر', price: 25, img: 'قسم الذكاء الاصطناعي .jpeg', desc: 'اشتراك سنة كاملة.' }
            ]
        };

        let cart = [];

        function openSection(name) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            storeData[name].forEach(p => {
                list.innerHTML += `<div class="product-card ripple" onclick="showProductDetails('${name}', '${p.id}')"><img src="${p.img}"><h3>${p.name}</h3><div style="color:#d4af37;">${p.price} ريال</div></div>`;
            });
            window.scrollTo(0,0);
        }

        function showProductDetails(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            const content = document.getElementById('detail-content');
            let varHtml = '';
            if(p.variants) {
                varHtml = `<div class="variant-box">`;
                p.variants.forEach(v => { varHtml += `<label style="display:block; margin:10px 0;"><input type="radio" name="pv" value="${v.n}" data-p="${v.p}"> ${v.n} - ${v.p} ريال</label>`; });
                if(p.allowCustom) varHtml += `<input type="number" id="cust" class="custom-input" placeholder="أو اكتب الرقم المطلوب">`;
                varHtml += `</div>`;
            }
            content.innerHTML = `<img src="${p.img}" style="width:100%; border-radius:15px;"><h2 style="margin:15px 0;">${p.name}</h2><p style="color:#ccc;">${p.desc || ''}</p>${varHtml}<button class="btn-main ripple" onclick="addToCart('${cat}','${id}')">إضافة 🛒</button>`;
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function addToCart(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            let finalN = p.name, finalP = p.price;
            if(p.variants) {
                const sel = document.querySelector('input[name="pv"]:checked');
                const cus = document.getElementById('cust')?.value;
                if(!sel && !cus) return alert('اختر العرض!');
                if(cus) { finalN += " (عدد: "+cus+")"; finalP = 0; }
                else { finalN += " ("+sel.value+")"; finalP = sel.dataset.p; }
            }
            cart.push({name: finalN, price: finalP});
            updateCart();
            closeAll();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const items = document.getElementById('cart-items');
            items.innerHTML = '';
            let total = 0;
            cart.forEach(i => { total += parseFloat(i.price); items.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #222;">${i.name} - ${i.price} ريال</div>`; });
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function checkout() {
            let msg = `*طلب جديد من متجر أومني*\n\n`;
            cart.forEach(i => msg += `- ${i.name}\n`);
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        }

        function goHome() { document.getElementById('main-content').style.display = 'block'; document.getElementById('section-view').style.display = 'none'; document.getElementById('back-btn').style.display = 'none'; }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('side-menu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
