<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات والتنسيق الفخم --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* الهيدر الزجاجي */
        header {
            position: fixed; top: 12px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.75); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }
        .saudi-flag { width: 24px; animation: wave 2s infinite ease-in-out; }
        @keyframes wave { 0%, 100% { transform: rotate(0) translateY(0); } 50% { transform: rotate(8deg) translateY(-3px); } }
        .menu-dots { font-size: 30px; color: #d4af37; cursor: pointer; }

        /* القائمة الجانبية الممتدة */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 85%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px 20px; border-left: 2px solid #d4af37; overflow-y: auto;
        }
        #side-menu.active { right: 0; }
        .menu-logo { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #d4af37; display: block; margin: 0 auto 15px; }

        /* روابط القائمة */
        .menu-list { list-style: none; margin-bottom: 20px; }
        .menu-list li { padding: 15px; border-bottom: 1px solid #1a1a1a; cursor: pointer; color: #fff; font-size: 0.95rem; }
        .sub-menu { padding: 10px 20px; background: #0a0a0a; display: none; }
        .sub-menu a { display: block; color: #aaa; text-decoration: none; padding: 10px 0; font-size: 0.85rem; }

        /* نظام التقييم */
        .review-section { background: #111; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #222; }
        .stars { color: #555; font-size: 1.5rem; cursor: pointer; margin: 10px 0; }
        .stars .star.active { color: #d4af37; }
        input, textarea { width: 100%; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-family: 'Cairo'; }
        .btn-submit { background: #d4af37; color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; }

        /* المحتوى الرئيسي */
        #main-store { padding-top: 90px; }
        
        /* الصورة الرئيسية (البنر اللي طلبتها) */
        .main-hero {
            width: 92%; margin: 0 auto 25px; display: block;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid #222; min-height: 150px;
        }

        .container { padding: 0 15px 40px; }
        .cat-card { margin-bottom: 30px; text-align: center; }
        .cat-card img { width: 100%; border-radius: 20px; aspect-ratio: 2/1; object-fit: cover; border: 1px solid #1a1a1a; }
        .cat-name { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.1rem; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
            متجر أومني
        </div>
        <div class="menu-dots" onclick="toggleMenu()">&#8942;</div>
    </header>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="side-menu">
        <img src="لوقو المتجر.jpeg" class="menu-logo" onerror="this.src='https://via.placeholder.com/100?text=OMNI'">
        <div style="text-align: center; color: #d4af37; font-weight: 900; margin-bottom: 25px;">OMNI STORE</div>
        
        <ul class="menu-list">
            <li onclick="location.reload()">🏠 الرئيسية</li>
            <li onclick="toggleSub('contact-sub')">📞 تواصل مع المتجر ▼</li>
            <div id="contact-sub" class="sub-menu">
                <a href="https://wa.me/9665XXXXXXXX?text=عندي مشكلة في طلبي">⚠️ مشكلة في طلبي</a>
                <a href="https://wa.me/9665XXXXXXXX?text=استفسار بخصوص طلبي">🔍 استفسار لطلبي</a>
                <a href="https://wa.me/9665XXXXXXXX?text=عندي استفسار عام">💡 استفسار عام</a>
            </div>
            <li>💬 جميع الأقسام</li>
        </ul>

        <div class="review-section">
            <div style="font-size: 0.9rem; margin-bottom: 10px; color: #d4af37;">قيم تجربتك معنا:</div>
            <input type="text" id="rev-name" placeholder="اسمك الكريم">
            <div class="stars" id="star-rating">
                <span class="star" data-v="1">★</span><span class="star" data-v="2">★</span><span class="star" data-v="3">★</span><span class="star" data-v="4">★</span><span class="star" data-v="5">★</span>
            </div>
            <textarea id="rev-text" placeholder="اكتب تقييمك هنا..." rows="3"></textarea>
            <button class="btn-submit" onclick="submitReview()">إرسال التقييم</button>
        </div>
    </div>

    <div id="main-store">
        <img src="my_hero_image.png" class="main-hero" id="hero-img" onerror="showImageError()">

        <div class="container">
            <div class="cat-card"><img src="قسم تيك توك .jpeg"><div class="cat-name">قسم تيك توك</div></div>
            <div class="cat-card"><img src="قسم انستا .jpeg"><div class="cat-name">قسم انستا</div></div>
            <div class="cat-card"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-name">قسم الذكاء الاصطناعي</div></div>
            <div class="cat-card"><img src="قسم ستيم اولاين .jpeg"><div class="cat-name">ألعاب ستيم أونلاين</div></div>
            <div class="cat-card"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-name">ألعاب ستيم أوفلاين</div></div>
        </div>
    </div>

    <script>
        // فتح وإغلاق القائمة
        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            const overlay = document.getElementById('overlay');
            menu.classList.toggle('active');
            overlay.style.display = menu.classList.contains('active') ? 'block' : 'none';
        }

        // فتح القوائم الفرعية
        function toggleSub(id) {
            const sub = document.getElementById(id);
            sub.style.display = (sub.style.display === 'block') ? 'none' : 'block';
        }

        // نظام النجوم
        const stars = document.querySelectorAll('.star');
        let selectedRating = 0;
        stars.forEach(s => {
            s.onclick = function() {
                selectedRating = this.getAttribute('data-v');
                stars.forEach(st => st.classList.remove('active'));
                for(let i=0; i<selectedRating; i++) stars[i].classList.add('active');
            }
        });

        // إرسال التقييم
        function submitReview() {
            const name = document.getElementById('rev-name').value;
            if(!name || selectedRating == 0) { alert('فضلاً ضع اسمك والتقييم'); return; }
            alert('شكراً لك ' + name + '! تم استلام تقييمك بنجاح.');
            toggleMenu();
        }

        // معالجة خطأ الصورة (إذا لم يجد الملف)
        function showImageError() {
            const img = document.getElementById('hero-img');
            console.log("الصورة لم تظهر! تأكد أن اسم الملف هو my_hero_image.png");
            // سأضع رابطاً مؤقتاً لترى كيف يظهر الشكل لو كانت الصورة مفقودة
            img.src = "https://via.placeholder.com/1000x500/000000/d4af37?text=OMNI+STORE+HERO";
        }
    </script>
</body>
</html>
