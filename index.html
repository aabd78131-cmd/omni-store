<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أومني للاشتراكات</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* واجهة الدخول */
        #authOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #111; padding: 35px; border-radius: 20px; border: 2px solid #c7a13c;
            width: 90%; max-width: 380px; text-align: center; box-shadow: 0 0 20px rgba(199, 161, 60, 0.2);
        }
        .login-card h2 { color: #c7a13c; margin-bottom: 25px; }
        input {
            width: 100%; padding: 14px; margin: 10px 0; background: #050505;
            border: 1px solid #333; color: #fff; border-radius: 10px; text-align: center; font-size: 16px; box-sizing: border-box;
        }
        .btn-login {
            width: 100%; padding: 14px; background: #c7a13c; color: #000; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* واجهة المتجر والمنتجات */
        #mainStore { display: none; padding: 20px; text-align: center; }
        .store-header { color: #c7a13c; margin-top: 40px; font-size: 28px; }
        .products-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; padding: 30px; max-width: 1000px; margin: 0 auto;
        }
        .product-card {
            background: #111; border: 1px solid #333; border-radius: 15px; padding: 20px;
            text-align: center; transition: 0.3s;
        }
        .product-card:hover { border-color: #c7a13c; transform: translateY(-5px); }
        .product-img { width: 100%; height: 150px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; }
        .product-title { color: #c7a13c; font-size: 20px; font-weight: bold; }
        .product-price { color: #fff; margin: 10px 0; font-size: 18px; }
        .btn-order {
            display: inline-block; padding: 10px 20px; background: #25d366; color: #fff;
            text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="login-card">
            <h2>أهلاً بك في أومني</h2>
            <input type="text" id="userName" placeholder="الاسم الكريم">
            <input type="tel" id="userPhone" placeholder="رقم الجوال (05xxxxxxx)">
            <button class="btn-login" onclick="handleLogin()">دخول للمتجر</button>
        </div>
    </div>

    <div id="mainStore">
        <h1 class="store-header">متجر أومني للاشتراكات</h1>
        <p style="color: #888;">أفضل العروض الحصرية بين يديك</p>

        <div class="products-grid">
            <div class="product-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_Premium_logo.svg" class="product-img" alt="YouTube">
                <div class="product-title">يوتيوب بريميوم</div>
                <div class="product-price">15 ريال / شهر</div>
                <a href="https://wa.me/9665XXXXXXXX" class="btn-order">طلب عبر واتساب</a>
            </div>

            <div class="product-card">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="product-img" alt="Netflix">
                <div class="product-title">نيتفليكس 4K</div>
                <div class="product-price">25 ريال / شهر</div>
                <a href="https://wa.me/9665XXXXXXXX" class="btn-order">طلب عبر واتساب</a>
            </div>
        </div>
    </div>

    <script>
        // 1. إعدادات Firebase الخاصة بمشروعك OmniStore
        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.firebasestorage.app",
            appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. دالة تسجيل الدخول
        function handleLogin() {
            const name = document.getElementById('userName').value.trim();
            const phone = document.getElementById('userPhone').value.trim();

            if (name.length < 3 || phone.length < 10) {
                alert("يرجى إدخال البيانات بشكل صحيح");
                return;
            }

            // حفظ البيانات في Realtime Database
            database.ref('customers/' + phone).set({
                full_name: name,
                phone_number: phone,
                last_login: new Date().toLocaleString('ar-SA')
            }).then(() => {
                localStorage.setItem('omni_session', JSON.stringify({name, phone}));
                enterStore();
            }).catch((err) => { alert("خطأ: " + err.message); });
        }

        function enterStore() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('mainStore').style.display = 'block';
        }

        window.onload = function() {
            if (localStorage.getItem('omni_session')) { enterStore(); }
        };
    </script>
</body>
</html>
