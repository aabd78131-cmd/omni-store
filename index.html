<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني - عالمك الرقمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c7a13c; --black: #000; --dark: #111; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: white; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* شاشة الدخول */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--dark); padding: 30px; border-radius: 25px; border: 2px solid var(--gold); width: 85%; max-width: 380px; text-align: center; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 15px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; font-size: 16px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; }

        /* زر الترس */
        #settingsBtn { position: fixed; top: 20px; right: 20px; z-index: 5000; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; }
        
        /* القائمة الجانبية */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--dark); z-index: 6000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-sizing: border-box; border-left: 3px solid var(--gold); }
        #sideMenu.active { right: 0; }
        .menu-header { text-align: center; margin-bottom: 30px; }
        .menu-item { padding: 18px; border-bottom: 1px solid #222; cursor: pointer; color: var(--gold); font-weight: bold; font-size: 18px; transition: 0.3s; }
        .menu-item:active { background: #1a1a1a; }

        /* الشاشة الرئيسية (صور الجوال والكمبيوتر) */
        .hero-section { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* طبقة الأزرار الشفافة للجوال */
        .touch-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; }
        .touch-grid button { position: absolute; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; cursor: pointer; }

        /* الصفحات الداخلية */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 8000; overflow-y: auto; }
        .header-fixed { position: sticky; top: 0; background: var(--dark); padding: 15px 20px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; z-index: 8100; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: 15px; }

        /* المنتجات والتقييمات */
        .list-container { padding: 20px; padding-bottom: 120px; }
        .item-card { background: var(--dark); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .add-btn { background: var(--gold); border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .review-input-area { background: var(--dark); padding: 20px; margin: 20px; border-radius: 15px; border: 1px solid var(--gold); }
        .review-input-area input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }

        /* التبديل بين الجوال والكمبيوتر */
        .pc-view { display: block; }
        .mobile-view { display: none; }

        @media (max-width: 768px) {
            .pc-view { display: none; }
            .mobile-view { display: block; }
            .touch-grid { display: block; }
        }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="login-card">
        <img src="لوقو متجر اومني .jpeg" class="logo-img" alt="Logo">
        <h2 style="color:var(--gold); margin:0 0 20px 0;">مرحباً بك في أومني</h2>
        <input type="text" id="userName" placeholder="الاسم الكريم">
        <input type="tel" id="userPhone" placeholder="رقم الجوال">
        <button onclick="handleLogin()">دخول المتجر</button>
    </div>
</div>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>

<div id="sideMenu">
    <div class="menu-header">
        <img src="لوقو متجر اومني .jpeg" class="logo-img" style="width:80px; height:80px;">
        <h3 style="color:var(--gold); margin:5px 0;">قائمة أومني</h3>
    </div>
    <div class="menu-item" onclick="toggleMenu()">🏠 الرئيسية</div>
    <div class="menu-item" onclick="openPage('cartPage')">🛒 سلة المشتريات</div>
    <div class="menu-item" onclick="openPage('reviewsPage')">⭐ التقييمات</div>
    <div class="menu-item" onclick="window.open('https://wa.me/966548512295')">📞 الدعم الفني</div>
    <div class="menu-item" onclick="logout()" style="color: #ff4444; margin-top: 50px; border: none;">🚪 خروج</div>
</div>

<div class="hero-section mobile-view">
    <img src="صوره القائمه الرئيسيه للجوال.jpeg" class="hero-img">
    <div class="touch-grid">
        <button style="top:18%; left:5%; width:90%; height:13%;" onclick="loadCategory('all', 'جميع الخدمات')"></button>
        <button style="top:34%; left:5%; width:45%; height:18%;" onclick="loadCategory('entertainment', 'قسم الترفيه')"></button>
        <button style="top:53%; left:5%; width:45%; height:18%;" onclick="loadCategory('ai', 'الذكاء الاصطناعي')"></button>
        <button style="top:72%; left:5%; width:44%; height:18%;" onclick="loadCategory('social', 'دعم السوشال ميديا')"></button>
        <button style="top:72%; left:51%; width:44%; height:18%;" onclick="loadCategory('cards', 'البطاقات الرقمية')"></button>
    </div>
</div>

<div class="hero-section pc-view">
    <img src="اومني القائمه الاوله.jpeg" class="hero-img">
    <div class="touch-grid" style="display:block;">
        <button style="top:75%; left:5%; width:20%; height:15%;" onclick="loadCategory('entertainment', 'الترفيه')"></button>
        <button style="top:75%; left:28%; width:20%; height:15%;" onclick="loadCategory('ai', 'الذكاء الاصطناعي')"></button>
        <button style="top:75%; left:52%; width:20%; height:15%;" onclick="loadCategory('social', 'السوشال ميديا')"></button>
        <button style="top:75%; left:75%; width:20%; height:15%;" onclick="loadCategory('cards', 'البطاقات')"></button>
    </div>
</div>

<div class="full-page" id="productsPage">
    <div class="header-fixed">
        <button class="back-btn" onclick="closePages()">🔙</button>
        <h3 id="catTitle" style="color:var(--gold); margin:0;"></h3>
    </div>
    <div class="list-container" id="productList"></div>
</div>

<div class="full-page" id="reviewsPage">
    <div class="header-fixed">
        <button class="back-btn" onclick="closePages()">🔙</button>
        <h3 style="color:var(--gold); margin:0;">تقييمات العملاء</h3>
    </div>
    <div class="review-input-area">
        <input type="text" id="revInput" placeholder="أضف رأيك هنا...">
        <button onclick="sendReview()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:8px; font-weight:bold;">نشر</button>
    </div>
    <div id="reviewsList" style="padding:0 20px;"></div>
</div>

<div class="full-page" id="cartPage">
    <div class="header-fixed">
        <button class="back-btn" onclick="closePages()">🔙</button>
        <h3 style="color:var(--gold); margin:0;">سلتك</h3>
    </div>
    <div id="cartItems" class="list-container"></div>
    <div style="position:fixed; bottom:0; width:100%; background:var(--dark); padding:20px; border-top:2px solid var(--gold); box-sizing:border-box;">
        <button onclick="checkout()" style="width:100%; padding:18px; background:var(--gold); border:none; border-radius:12px; font-weight:bold; font-size:18px;">تأكيد الطلب عبر واتساب 👑</button>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];
    let productsData = [];

    // نظام الدخول
    window.onload = () => {
        if(localStorage.getItem('omni_logged')) document.getElementById('authOverlay').style.display = 'none';
        db.ref('products').on('value', s => { productsData = Object.values(s.val() || {}); });
        getReviews();
    };

    function handleLogin() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        if(name && phone) {
            db.ref('users/' + phone).set({name, phone});
            localStorage.setItem('omni_logged', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        }
    }

    function logout() { localStorage.clear(); location.reload(); }

    // التحكم في القائمة والصفحات
    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

    function openPage(id) {
        closePages();
        document.getElementById(id).style.display = 'block';
        document.getElementById('settingsBtn').style.display = 'none';
        toggleMenu();
    }

    function closePages() {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById('settingsBtn').style.display = 'flex';
    }

    // المنتجات
    function loadCategory(cat, title) {
        document.getElementById('catTitle').innerText = title;
        const list = document.getElementById('productList');
        list.innerHTML = '';
        const filtered = (cat === 'all') ? productsData : productsData.filter(p => p.category === cat);
        
        filtered.forEach(p => {
            list.innerHTML += `
                <div class="item-card">
                    <div>
                        <h4 style="margin:0;">${p.name}</h4>
                        <span style="color:var(--gold)">${p.price} ريال</span>
                    </div>
                    <button class="add-btn" onclick="addToCart('${p.name}', ${p.price})">إضافة</button>
                </div>`;
        });
        openPage('productsPage');
    }

    // السلة
    function addToCart(name, price) {
        const item = cart.find(i => i.name === name);
        if(item) item.qty++; else cart.push({name, price, qty:1});
        alert("تمت الإضافة للسلة ✅");
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        container.innerHTML = '';
        cart.forEach((item, index) => {
            container.innerHTML += `
                <div class="item-card">
                    <span>${item.name} (x${item.qty})</span>
                    <button onclick="removeItem(${index})" style="background:#ff4444; border:none; padding:5px 10px; border-radius:5px; color:white;">حذف</button>
                </div>`;
        });
    }

    function removeItem(i) { cart.splice(i, 1); updateCartUI(); }

    function checkout() {
        if(cart.length === 0) return alert("السلة فارغة!");
        let text = "طلب جديد من أومني:\n";
        cart.forEach(i => text += `- ${i.name} (العدد: ${i.qty})\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(text)}`);
    }

    // التقييمات
    function sendReview() {
        const val = document.getElementById('revInput').value;
        if(val) {
            db.ref('reviews').push({text: val, date: new Date().toLocaleDateString('ar-SA')});
            document.getElementById('revInput').value = '';
        }
    }

    function getReviews() {
        db.ref('reviews').on('value', s => {
            const container = document.getElementById('reviewsList');
            container.innerHTML = '';
            const data = s.val();
            for(let id in data) {
                container.innerHTML += `
                    <div style="background:#111; padding:15px; border-radius:12px; margin-bottom:10px; border-right:4px solid var(--gold);">
                        <p style="margin:0;">${data[id].text}</p>
                        <small style="color:#666;">${data[id].date}</small>
                    </div>`;
            }
        });
    }
</script>

</body>
</html>
