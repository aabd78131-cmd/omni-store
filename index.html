<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات الأساسية */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .ripple { position: relative; overflow: hidden; }
        .ripple:active:after { 
            content: ""; position: absolute; width: 100%; height: 100%; top: 0; left: 0; 
            background: rgba(212, 175, 55, 0.25); border-radius: 50%; transform: scale(0); 
            animation: ripple-animation 0.5s linear; 
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        header {
            position: fixed; top: 10px; left: 2.5%; width: 95%; height: 60px;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.5); border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; z-index: 1000;
        }
        .header-right { flex: 1; display: flex; justify-content: flex-start; }
        .header-center { flex: 2; display: flex; justify-content: center; align-items: center; }
        .header-left { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 15px; }

        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .saudi-flag { width: 22px; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { 
            position: absolute; top: -5px; right: -8px; background: #ff0000; color: white; 
            font-size: 11px; width: 18px; height: 18px; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; font-weight: bold; 
        }

        /* القائمة الجانبية */
        #side-menu { 
            position: fixed; top: 0; right: -100%; width: 85%; height: 100vh; 
            background: #080808; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 40px 20px; border-left: 2px solid #d4af37; overflow-y: auto;
        }
        #side-menu.active { right: 0; }
        .menu-header { text-align: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid #222; }
        .menu-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #d4af37; object-fit: cover; }
        .menu-item { padding: 15px; display: flex; align-items: center; gap: 12px; font-size: 1.1rem; border-bottom: 1px solid #111; cursor: pointer; }

        /* المحتوى الرئيسي */
        #main-content { padding-top: 100px; }
        .hero-banner { width: 92%; margin: 0 auto 30px; display: block; border-radius: 20px; }
        .container { padding: 0 15px 60px; }
        .cat-item { margin-bottom: 30px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: #d4af37; font-weight: 900; margin-top: 12px; font-size: 1.3rem; }

        #section-view { display: none; padding: 100px 15px 60px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 18px; padding: 12px; text-align: center; }
        .product-card img { width: 100%; border-radius: 12px; aspect-ratio: 1/1; object-fit: cover; }

        /* النوافذ المنبثقة */
        .modal { 
            position: fixed; bottom: -100%; left: 0; width: 100%; 
            max-height: 92vh; background: #0a0a0a; z-index: 3000; 
            border-top: 3px solid #d4af37; border-radius: 30px 30px 0 0; 
            transition: 0.5s; padding: 30px 20px; overflow-y: auto; 
        }
        .modal.active { bottom: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.85); z-index: 1500; display: none; }
        
        .btn-main { background: linear-gradient(90deg, #d4af37, #f2d06b); color: #000; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: 900; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-right"><div class="nav-icon ripple" onclick="toggleMenu()">&#8942;</div></div>
        <div class="header-center">
            <div class="header-title">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Flag_of_Saudi_Arabia.svg" class="saudi-flag">
                متجر أومني
            </div>
        </div>
        <div class="header-left">
            <div class="cart-wrapper ripple" onclick="toggleCart()" style="position:relative;">
                <div class="nav-icon">🛒</div>
                <div class="cart-badge" id="cart-count">0</div>
            </div>
            <div class="back-btn ripple" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-header"><img src="لوقو المتجر.jpeg" class="menu-logo"></div>
        <div class="menu-item ripple" onclick="goHome(); closeAll();">🏠 الرئيسية</div>
        <div class="menu-item ripple" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</div>
        <div class="menu-item ripple" onclick="openSection('قسم انستا'); closeAll();">📸 انستقرام</div>
        <div class="menu-item ripple" onclick="window.open('https://wa.me/966548512295')">💬 الدعم الفني</div>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item ripple" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">قسم ستيم أوفلاين</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title-display" style="text-align:center; color:#d4af37; margin-bottom:25px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <div id="product-detail-modal" class="modal"><div id="detail-content"></div></div>

    <div id="cart-modal" class="modal">
        <h2 style="color:#d4af37; margin-bottom:20px;">سلة المشتريات</h2>
        <div id="cart-items"></div>
        <div id="cart-total" style="margin:20px 0; font-weight:900; color:#d4af37;"></div>
        <button class="btn-main ripple" onclick="checkout()">تأكيد الطلب عبر واتساب 💬</button>
    </div>

    <script>
        const storeData = {
            'قسم ستيم أوفلاين': [
                { id: 'cinema_25', name: 'Cinema Simulator 2025', price: 15, img: 'منتج لعبه  اوفلاين Cinema Simulator 2025.jpg', desc: 'لعبة نظامية من ستيم أوفلاين.' }
            ],
            'قسم الذكاء الاصطناعي': [
                { id: 'gpt_1', name: 'شات جي بي تي شهر', price: 12.99, img: 'قسم الذكاء الاصطناعي .jpeg', desc: 'حساب مشترك شهر.' }
            ]
        };

        let cart = [];

        function openSection(name) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('sec-title-display').innerText = name;
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            storeData[name].forEach(p => {
                list.innerHTML += `<div class="product-card ripple" onclick="showDetails('${name}','${p.id}')"><img src="${p.img}"><h3>${p.name}</h3></div>`;
            });
        }

        function showDetails(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            document.getElementById('detail-content').innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:20px;">
                <h2 style="color:#d4af37; margin:15px 0;">${p.name}</h2>
                <p>${p.desc}</p>
                <button class="btn-main ripple" onclick="addToCart('${cat}','${id}')">إضافة للسلة</button>
            `;
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function addToCart(cat, id) {
            const p = storeData[cat].find(x => x.id === id);
            cart.push({ name: p.name, price: p.price });
            document.getElementById('cart-count').innerText = cart.length;
            closeAll();
        }

        function toggleCart() {
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = '';
            let total = 0;
            cart.forEach((item, i) => {
                total += item.price;
                itemsDiv.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #222;">${item.name} - ${item.price} ريال</div>`;
            });
            document.getElementById('cart-total').innerText = 'المجموع: ' + total.toFixed(2) + ' ريال';
            document.getElementById('cart-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        // الدالة المحدثة لإنشاء رمز الطلب والتاريخ
        function checkout() {
            if(cart.length === 0) return alert('السلة فارغة!');
            
            // 1. توليد رمز طلب فريد (وقت الزبون بالثواني + رقم عشوائي)
            const orderID = Math.floor(Date.now() / 1000).toString().slice(-4) + Math.floor(1000 + Math.random() * 9000);
            
            // 2. الحصول على التاريخ الحالي
            const d = new Date();
            const dateStr = `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
            const timeStr = `${d.getHours()}:${d.getMinutes()}`;

            let msg = `*طلب جديد من متجر أومني*\n`;
            msg += `--------------------------\n`;
            msg += `*الرمز الفريد:* #${orderID}\n`;
            msg += `*التاريخ:* ${dateStr} | *الوقت:* ${timeStr}\n`;
            msg += `--------------------------\n`;
            
            let total = 0;
            cart.forEach((item, i) => {
                msg += `${i+1}. ${item.name} [${item.price} ريال]\n`;
                total += item.price;
            });
            
            msg += `--------------------------\n`;
            msg += `*الإجمالي:* ${total.toFixed(2)} ريال`;
            
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        }

        function goHome() { document.getElementById('main-content').style.display = 'block'; document.getElementById('section-view').style.display = 'none'; document.getElementById('back-btn').style.display = 'none'; }
        function toggleMenu() { document.getElementById('side-menu').classList.add('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAll() { document.querySelectorAll('.modal').forEach(m => m.classList.remove('active')); document.getElementById('side-menu').classList.remove('active'); document.getElementById('overlay').style.display = 'none'; }
    </script>
</body>
</html>
