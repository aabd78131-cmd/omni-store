<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .ripple { position: relative; overflow: hidden; }
        .ripple:after {
            content: ""; display: block; position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat; background-position: 50%; transform: scale(10, 10);
            opacity: 0; transition: transform .5s, opacity 1s;
        }
        .ripple:active:after { transform: scale(0, 0); opacity: .3; transition: 0s; }

        header {
            position: fixed; top: 10px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000;
        }
        
        .header-center { position: absolute; left: 50%; transform: translateX(-50%); display: flex; align-items: center; }
        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 11px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        #side-menu {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37;
        }
        #side-menu.active { right: 0; }
        .menu-logo-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }

        #main-content { padding-top: 100px; }
        .hero-banner { width: 92%; margin: 0 auto 30px; display: block; border-radius: 20px; border: 1px solid #222; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 30px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.2rem; }

        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }

        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 92vh;
            background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37;
            border-radius: 25px 25px 0 0; transition: 0.4s; padding: 25px 20px; overflow-y: auto;
        }
        .modal.active { bottom: 0; }
        .variant-box { background: #111; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .variant-option { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; }
        .custom-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; }
        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="nav-icon ripple" onclick="toggleMenu()">&#9776;</div>
        <div class="header-center">
            <div class="header-title" id="main-title">متجر أومني</div>
            <div class="back-btn ripple" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
        <div class="cart-wrapper ripple" onclick="toggleCart()" style="position:relative;">
            <div class="nav-icon">🛒</div>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.jpeg" class="menu-logo"></div>
        <ul style="list-style:none;">
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="goHome(); closeAll();">🏠 الرئيسية</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('entertainment'); closeAll();">🍿 قسم الترفيه</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('insta'); closeAll();">📸 قسم انستقرام</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('tiktok'); closeAll();">📱 قسم تيك توك</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('steam_offline'); closeAll();">🕹️ ستيم أوفلاين</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('ai'); closeAll();">🤖 الذكاء الاصطناعي</li>
        </ul>
    </div>

    <div id="product-detail-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <div id="detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <h2 style="color:#d4af37; margin-bottom:20px;">سلة المشتريات</h2>
        <div class="variant-box">
            <input type="text" id="user-name" class="custom-input" placeholder="الاسم (إجباري)">
            <input type="tel" id="user-phone" class="custom-input" placeholder="رقم الهاتف (إجباري)">
        </div>
        <div id="cart-items"></div>
        <div style="margin:20px 0; font-size:1.2rem; color:#d4af37; font-weight:bold;">المجموع: <span id="cart-total">0</span> ريال</div>
        <button class="btn-main ripple" onclick="checkout()">تأكيد عبر واتساب</button>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item ripple" onclick="openSection('entertainment')"><img src="قسم اشتراكات الترفيه.jpeg"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item ripple" onclick="openSection('insta')"><img src="قسم انستا .jpeg"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item ripple" onclick="openSection('tiktok')"><img src="قسم تيك توك .jpeg"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item ripple" onclick="openSection('steam_offline')"><img src="قسم ستيم اوفلاين.jpeg"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item ripple" onclick="openSection('ai')"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title" style="text-align:center; color:#d4af37; margin-bottom:20px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <script>
        const categoryMap = {
            'entertainment': 'قسم الترفيه',
            'insta': 'قسم انستا',
            'tiktok': 'قسم تيك توك',
            'steam_offline': 'قسم ستيم أوفلاين',
            'ai': 'قسم الذكاء الاصطناعي'
        };

        let cart = [];

        // تحويل خيارات المنتج من نص (شهر=10) إلى مصفوفة كائنات
        function parseVariants(vString) {
            if(!vString) return null;
            return vString.split(',').map(item => {
                const [n, p] = item.split('=');
                return { n: n.trim(), p: parseFloat(p.trim()) };
            });
        }

        function openSection(catKey) {
            const allProducts = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
            const sectionProducts = allProducts.filter(p => p.category === catKey);
            
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('sec-title').innerText = categoryMap[catKey];
            
            const list = document.getElementById('products-list');
            list.innerHTML = '';
            
            if(sectionProducts.length === 0) {
                list.innerHTML = '<p style="grid-column: 1/3; text-align:center; color:#666;">لا توجد منتجات حالياً</p>';
            }

            sectionProducts.forEach(p => {
                list.innerHTML += `
                    <div class="product-card ripple" onclick="showProductDetails('${p.id}')">
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <div style="color:#d4af37;">${p.price} ريال</div>
                    </div>`;
            });
            window.scrollTo(0,0);
        }

        function showProductDetails(id) {
            const allProducts = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
            const p = allProducts.find(x => x.id === id);
            const content = document.getElementById('detail-content');
            
            let variantsHtml = '';
            const variants = parseVariants(p.vars);
            
            if(variants) {
                variantsHtml = `<div class="variant-box"><p style="margin-bottom:10px; font-weight:bold;">اختر العرض:</p>`;
                variants.forEach((v, i) => {
                    variantsHtml += `<label class="variant-option"><input type="radio" name="prod-var" value="${v.n}" data-price="${v.p}"> ${v.n} - ${v.p} ريال</label>`;
                });
                variantsHtml += `</div>`;
            }

            content.innerHTML = `
                <img src="${p.img}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <h2>${p.name}</h2>
                <div style="font-size:1.5rem; color:#d4af37; font-weight:900; margin:10px 0;">${p.price} ريال</div>
                <div style="color:#ccc; font-size:0.9rem; line-height:1.6; white-space: pre-line;">${p.desc}</div>
                ${variantsHtml}
                <button class="btn-main ripple" onclick="handleAddToCart('${p.id}')">إضافة للسلة 🛒</button>
            `;
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function handleAddToCart(id) {
            const allProducts = JSON.parse(localStorage.getItem('omni_store_products') || '[]');
            const p = allProducts.find(x => x.id === id);
            let finalName = p.name;
            let finalPrice = parseFloat(p.price);

            const selectedVar = document.querySelector('input[name="prod-var"]:checked');
            if(parseVariants(p.vars) && !selectedVar) return alert("يرجى اختيار عرض!");

            if(selectedVar) {
                finalName += ` (${selectedVar.value})`;
                finalPrice = selectedVar.getAttribute('data-price');
            }

            cart.push({name: finalName, price: finalPrice});
            updateCart();
            alert("تمت الإضافة!");
            closeAll();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += parseFloat(item.price);
                list.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #222;"><b>${item.name}</b><div style="color:#d4af37;">${item.price} ريال</div></div>`;
            });
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        function checkout() {
            let name = document.getElementById('user-name').value;
            let phone = document.getElementById('user-phone').value;
            if(cart.length === 0 || !name || !phone) return alert('أكمل بياناتك والسلة!');
            
            let msg = `*طلب جديد من متجر أومني*\nالاسم: ${name}\nالهاتف: ${phone}\n\n*الطلبات:*\n`;
            cart.forEach(i => msg += `- ${i.name}\n`);
            msg += `\n*المجموع: ${document.getElementById('cart-total').innerText} ريال*`;
            
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        }

        function goHome() { 
            document.getElementById('main-content').style.display = 'block'; 
            document.getElementById('section-view').style.display = 'none'; 
            document.getElementById('back-btn').style.display = 'none'; 
            document.getElementById('main-title').style.display = 'flex'; 
        }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        // الاستماع للتغييرات من لوحة التحكم لتحديث المتجر تلقائياً
        window.addEventListener('storage', () => {
            if(document.getElementById('section-view').style.display === 'block') {
                const currentTitle = document.getElementById('sec-title').innerText;
                const catKey = Object.keys(categoryMap).find(key => categoryMap[key] === currentTitle);
                if(catKey) openSection(catKey);
            }
        });
    </script>
</body>
</html>
