<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Store - الفخامة الرقمية</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #c7a13c; --bg: #000; --secondary: #8a2be2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; overflow-x: hidden; font-family: sans-serif; }
        
        .hero-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        .hero-image { width: 100%; height: 100%; object-fit: cover; }
        
        .pc-only { display: block; }
        .mobile-only { display: none; }

        @media (max-width: 600px) {
            .pc-only { display: none; }
            .mobile-only { display: block; }
        }

        /* طبقة اللمس - الأزرار فقط */
        .touch-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 300; pointer-events: none; }
        .touch-grid button { position: absolute; background: transparent; border: none; cursor: pointer; pointer-events: auto; -webkit-tap-highlight-color: transparent; }
        
        /* إحداثيات الكمبيوتر (أفقي) */
        .pc-only .btn-all { top: 32%; left: 5%; width: 60%; height: 30%; }
        .pc-only .btn-ent { bottom: 5%; left: 3%; width: 22%; height: 25%; }
        .pc-only .btn-ai { bottom: 5%; left: 27%; width: 22%; height: 25%; }
        .pc-only .btn-social { bottom: 5%; left: 51%; width: 22%; height: 25%; }
        .pc-only .btn-cards { bottom: 5%; left: 75%; width: 22%; height: 25%; }

        /* إحداثيات الجوال (عمودي) بناءً على صورتك الجديدة */
        .mobile-only .btn-all { top: 18%; left: 5%; width: 90%; height: 15%; } /* استكشف الخدمات */
        .mobile-only .btn-ent { top: 35%; left: 5%; width: 45%; height: 18%; } /* ترفيه */
        .mobile-only .btn-ai { top: 55%; left: 5%; width: 45%; height: 18%; } /* ذكاء اصطناعي */
        .mobile-only .btn-social { top: 73%; left: 5%; width: 45%; height: 18%; } /* سوشال ميديا */
        .mobile-only .btn-cards { top: 73%; left: 52%; width: 45%; height: 18%; } /* بطاقات */

        #mainSupport { position: fixed; top: 15px; left: 15px; z-index: 2000; }
        .support-btn { background: #25d366; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; border: 1px solid white; font-size: 13px; }

        .section-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1500; overflow-y: auto; }
        .section-page.active { display: block; }
        .section-header { position: sticky; top: 0; background: #111; padding: 15px; border-bottom: 2px solid var(--primary); display: flex; align-items: center; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; padding: 15px; padding-bottom: 120px; }
        .product-card { background: #161616; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #222; }
        .product-card img { width: 100%; height: 100px; object-fit: cover; border-radius: 6px; }
        .cart-bar { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; padding: 20px; border-top: 2px solid var(--primary); display: none; justify-content: space-between; align-items: center; z-index: 1600; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="mainSupport">
    <div class="support-btn" onclick="window.open('https://wa.me/966548512295')">الدعم الفني 💬</div>
</div>

<div class="hero-container">
    <div class="pc-only" style="height: 100%;">
        <img src="اومني القائمه الاوله.jpeg" class="hero-image">
        <div class="touch-grid">
            <button class="btn-all" onclick="openSection('all', 'جميع الخدمات')"></button>
            <button class="btn-ent" onclick="openSection('entertainment', 'ترفيه بلا حدود')"></button>
            <button class="btn-ai" onclick="openSection('ai', 'أدوات الذكاء الاصطناعي')"></button>
            <button class="btn-social" onclick="openSection('social', 'دعم السوشال ميديا')"></button>
            <button class="btn-cards" onclick="openSection('cards', 'بطاقات وهدايا')"></button>
        </div>
    </div>
    
    <div class="mobile-only" style="height: 100%;">
        <img src="صوره القائمه الرئيسيه للجوال.jpeg" class="hero-image">
        <div class="touch-grid">
            <button class="btn-all" onclick="openSection('all', 'جميع الخدمات')"></button>
            <button class="btn-ent" onclick="openSection('entertainment', 'ترفيه بلا حدود')"></button>
            <button class="btn-ai" onclick="openSection('ai', 'أدوات الذكاء الاصطناعي')"></button>
            <button class="btn-social" onclick="openSection('social', 'دعم السوشال ميديا')"></button>
            <button class="btn-cards" onclick="openSection('cards', 'بطاقات وهدايا')"></button>
        </div>
    </div>
</div>

<div class="section-page" id="sectionPage">
    <div class="section-header">
        <button style="background:var(--primary); border:none; padding:10px 18px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="closeSection()">🔙 عودة</button>
        <h2 id="sectionTitle" style="margin-right:15px; color:var(--primary); font-size:1em;"></h2>
    </div>
    <div class="products-grid" id="sectionProducts"></div>
</div>

<div class="cart-bar" id="cartBar">
    <div id="cartCount" style="color:var(--primary); font-weight:bold;">السلة: 0</div>
    <button style="background:var(--primary); border:none; padding:12px 25px; border-radius:5px; font-weight:bold; cursor:pointer;" onclick="sendOrder()">طلب المنتجات 👑</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cart = []; let allProducts = [];

    db.ref('products').on('value', (snapshot) => {
        const data = snapshot.val();
        allProducts = [];
        for (let id in data) { allProducts.push(data[id]); }
    });

    function openSection(cat, title) {
        document.getElementById('sectionTitle').innerText = title;
        const display = document.getElementById('sectionProducts');
        display.innerHTML = '';
        const filtered = (cat === 'all') ? allProducts : allProducts.filter(p => p.category === cat);
        filtered.forEach(p => {
            display.innerHTML += `<div class="product-card"><img src="${p.image}"><h4>${p.name}</h4><p style="color:var(--primary)">${p.price} ريال</p><button style="width:100%; padding:8px; background:var(--secondary); color:white; border:none; border-radius:5px;" onclick="addToCart('${p.name}', '${p.price}')">إضافة</button></div>`;
        });
        document.getElementById('sectionPage').classList.add('active');
        document.getElementById('mainSupport').style.display = 'none';
    }

    function closeSection() { 
        document.getElementById('sectionPage').classList.remove('active');
        document.getElementById('mainSupport').style.display = 'block';
    }
    
    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cartBar').style.display = 'flex';
        document.getElementById('cartCount').innerText = `السلة: ${cart.length}`;
    }

    function sendOrder() {
        let msg = "طلب جديد من متجر أومني:\n";
        cart.forEach((i, index) => msg += `${index+1}- ${i.name}\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
    }
</script>
</body>
</html>
