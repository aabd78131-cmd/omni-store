<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني - الإصدار الاحترافي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c7a13c; --black: #000; --dark: #121212; --gray: #252525; --red: #ff4d4d; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* شاشة الدخول */
        #authOverlay { position: fixed; inset: 0; background: var(--black); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--dark); padding: 40px 30px; border-radius: 30px; border: 2px solid var(--gold); width: 85%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; outline: none; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; width: 100%; }

        /* القائمة الجانبية والترس */
        #settingsBtn { position: fixed; top: 25px; right: 25px; width: 50px; height: 50px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 77777; cursor: pointer; }
        #sideMenu { position: fixed; top: 0; right: -350px; width: 300px; height: 100%; background: var(--dark); z-index: 95000; transition: 0.4s; padding: 20px; box-sizing: border-box; border-left: 3px solid var(--gold); }
        #sideMenu.active { right: 0; }
        .close-menu-btn { position: absolute; top: 20px; left: 20px; color: var(--gold); cursor: pointer; font-weight: bold; }

        /* الكروت والمنتجات */
        .card { background: var(--dark); padding: 20px; border-radius: 20px; border: 1px solid #222; margin: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .product-info { flex-grow: 1; }
        .price-tag { color: var(--gold); font-weight: bold; display: block; margin-top: 5px; }

        /* نافذة تفاصيل المنتج (التي طلبتها) */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 90000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--dark); border: 2px solid var(--gold); border-radius: 25px; padding: 25px; width: 100%; max-width: 450px; position: relative; }
        .modal-desc { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 15px 0; line-height: 1.6; color: #ccc; white-space: pre-line; }

        /* لوحة التحكم (للمالك فقط) */
        .admin-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-top: 20px; border: 1px solid #444; }
        .admin-box input, .admin-box textarea, .admin-box select { width: 100%; padding: 10px; margin: 5px 0; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }

        /* السلة العائمة */
        #floatingCart { position: fixed; bottom: 30px; left: 25px; width: 65px; height: 65px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 88888; cursor: pointer; box-shadow: 0 5px 20px rgba(199, 161, 60, 0.4); }
        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; border: 2px solid #000; }

        .page { display: none; position: fixed; inset: 0; background: var(--black); z-index: 80000; overflow-y: auto; padding-bottom: 120px; }
        .hero { width: 100vw; height: 100vh; position: relative; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }

        .pc-v { display: block; } .mob-v { display: none; }
        @media (max-width: 768px) { .pc-v { display: none; } .mob-v { display: block; } }
    </style>
</head>
<body>

<div id="menuOverlay" onclick="toggleMenu()"></div>

<div id="authOverlay">
    <div class="login-box">
        <img src="لوقو متجر اومني .jpeg" style="width:80px; border-radius:50%; border:2px solid var(--gold); margin-bottom:15px;">
        <h2 style="color:var(--gold); margin:0;">دخول</h2>
        <input type="text" id="regName" placeholder="الاسم الكريم">
        <input type="tel" id="regPhone" placeholder="رقم الجوال">
        <button onclick="saveSession()">استمرار</button>
    </div>
</div>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>
<div id="floatingCart" onclick="openPage('cartPage')">🛒<div class="cart-count" id="cartBadge">0</div></div>

<div id="sideMenu">
    <div class="close-menu-btn" onclick="toggleMenu()">✕ إغلاق</div>
    <div style="height:50px;"></div>
    <div class="user-name" id="displayUser">أهلاً بك</div>
    <div class="menu-item" onclick="loadProducts('all', '📦 جميع المنتجات')">📦 جميع الخدمات</div>
    <div class="menu-item" onclick="loadProducts('entertainment', '🎬 الترفيه')">🎬 الترفيه</div>
    <div class="menu-item" onclick="loadProducts('ai', '🤖 الذكاء الاصطناعي')">🤖 الذكاء الاصطناعي</div>
    <hr style="border:0.1px solid #333;">
    <div class="menu-item" onclick="checkAdmin()">🔑 لوحة التحكم (للمالك)</div>
    <div class="menu-item" onclick="logout()" style="color:var(--red);">🚪 خروج</div>
</div>

<div class="hero mob-v"><img src="صوره القائمه الرئيسيه للجوال.jpeg" onclick="loadProducts('all', '📦 جميع الخدمات')"></div>
<div class="hero pc-v"><img src="اومني القائمه الاوله.jpeg" onclick="loadProducts('all', '📦 جميع الخدمات')"></div>

<div class="page" id="productsPage">
    <div style="padding:20px; border-bottom:1px solid var(--gold); background:var(--dark); position:sticky; top:0; display:flex; align-items:center;">
        <button onclick="closeAll()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; margin-left:15px;">🔙</button>
        <h3 id="pageTitle" style="margin:0; color:var(--gold);"></h3>
    </div>
    <div id="productsGrid"></div>
</div>

<div id="detailsModal">
    <div class="modal-content">
        <div onclick="document.getElementById('detailsModal').style.display='none'" style="position:absolute; top:15px; left:20px; cursor:pointer;">✕</div>
        <h2 id="mTitle" style="color:var(--gold); margin-top:0;"></h2>
        <div class="modal-desc" id="mDesc"></div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span id="mPrice" style="font-size:20px; font-weight:bold; color:var(--gold);"></span>
            <button id="addBtnModal" style="background:var(--gold); border:none; padding:12px 25px; border-radius:12px; font-weight:bold;">إضافة للسلة 🛒</button>
        </div>
    </div>
</div>

<div class="page" id="cartPage">
    <div style="padding:20px; background:var(--dark); border-bottom:1px solid var(--gold);"><button onclick="closeAll()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px;">🔙</button></div>
    <div id="cartGrid"></div>
    <div style="padding:20px; background:#1a1a1a; margin:15px; border-radius:20px; border:1px dashed var(--gold);">
        <label>📧 بريدك الإلكتروني (اختياري)</label>
        <input type="email" id="userEmail" placeholder="example@gmail.com" style="width:100%; padding:12px; margin-top:10px; background:#000; border:1px solid #333; color:white; border-radius:10px; text-align:center;">
        <p style="color:var(--gold); font-size:12px; text-align:center; margin-top:10px;">⚠️ لا تضع البريد إلا إذا تطلبه المنتج. في حال الغلط لن يتم التعويض.</p>
    </div>
    <button onclick="sendOrder()" style="width:90%; display:block; margin:20px auto; padding:18px; background:var(--gold); border:none; border-radius:15px; font-weight:bold; font-size:18px;">تأكيد وواتساب ✅</button>
</div>

<div class="page" id="adminPage">
    <div style="padding:20px; background:var(--dark); border-bottom:1px solid var(--gold); display:flex; justify-content:space-between;">
        <h3 style="color:var(--gold); margin:0;">لوحة إدارة المتجر</h3>
        <button onclick="closeAll()">إغلاق</button>
    </div>
    <div class="admin-box">
        <h4>➕ إضافة منتج جديد</h4>
        <input type="text" id="pName" placeholder="اسم المنتج (مثلاً: نتفليكس شهر)">
        <input type="number" id="pPrice" placeholder="السعر (ريال)">
        <select id="pCat">
            <option value="entertainment">ترفيه</option>
            <option value="ai">ذكاء اصطناعي</option>
            <option value="social">سوشال ميديا</option>
        </select>
        <textarea id="pDesc" placeholder="وصف المنتج (مميزات الاشتراك، الضمان، شروط التسليم...)" rows="4"></textarea>
        <button onclick="addProduct()" style="width:100%; padding:12px; background:var(--gold); border:none; border-radius:8px; font-weight:bold; margin-top:10px;">حفظ المنتج في المتجر ✅</button>
    </div>
    <div id="adminList" style="margin-top:20px; padding:10px;"></div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myCart = [];
    let productsData = {};

    window.onload = () => {
        const u = localStorage.getItem('omni_user');
        if(u) { document.getElementById('authOverlay').style.display = 'none'; document.getElementById('displayUser').innerText = "مرحباً، " + u; }
        db.ref('products').on('value', s => { 
            productsData = s.val() || {}; 
            renderAdminList();
        });
    };

    function saveSession() {
        const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value;
        if(n && p) { localStorage.setItem('omni_user', n); localStorage.setItem('omni_phone', p); location.reload(); }
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); document.getElementById('menuOverlay').style.display = document.getElementById('sideMenu').classList.contains('active')?'block':'none'; }

    function openPage(id) { 
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); 
        document.getElementById(id).style.display = 'block'; 
        toggleMenu(); 
    }
    function closeAll() { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); }

    // عرض المنتجات للزبون
    function loadProducts(cat, title) {
        document.getElementById('pageTitle').innerText = title;
        const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
        Object.keys(productsData).forEach(key => {
            const p = productsData[key];
            if(cat === 'all' || p.category === cat) {
                grid.innerHTML += `<div class="card" onclick="showDetails('${key}')">
                    <div class="product-info"><b>${p.name}</b><span class="price-tag">${p.price} ريال</span></div>
                    <button onclick="event.stopPropagation(); addToCart('${p.name}', ${p.price})" style="background:var(--gold); border:none; padding:10px; border-radius:10px;">➕</button>
                </div>`;
            }
        });
        openPage('productsPage');
    }

    // إظهار نافذة الوصف (الميزة الجديدة)
    function showDetails(key) {
        const p = productsData[key];
        document.getElementById('mTitle').innerText = p.name;
        document.getElementById('mDesc').innerText = p.description || "لا يوجد وصف حالياً.";
        document.getElementById('mPrice').innerText = p.price + " ريال";
        document.getElementById('addBtnModal').onclick = () => { addToCart(p.name, p.price); document.getElementById('detailsModal').style.display='none'; };
        document.getElementById('detailsModal').style.display = 'flex';
    }

    function addToCart(n, p) {
        myCart.push({n, p});
        document.getElementById('cartBadge').innerText = myCart.length;
        updateCart();
    }

    function updateCart() {
        const grid = document.getElementById('cartGrid'); grid.innerHTML = ''; let total = 0;
        myCart.forEach((item, i) => { total += item.p; grid.innerHTML += `<div class="card"><span>${item.n}</span><button onclick="myCart.splice(${i},1);updateCart();" style="color:red; background:none; border:none;">حذف</button></div>`; });
        grid.innerHTML += `<h3 style="text-align:center; color:var(--gold);">الإجمالي: ${total} ريال</h3>`;
    }

    function sendOrder() {
        if(myCart.length === 0) return;
        const email = document.getElementById('userEmail').value;
        let t = `طلب جديد (${localStorage.getItem('omni_user')}):\n`;
        myCart.forEach(i => t += `- ${i.n} (${i.p} ريال)\n`);
        t += (email) ? `\n📧 البريد: ${email}` : "";
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(t)}`);
    }

    // وظائف لوحة التحكم للمالك
    function checkAdmin() {
        const pin = prompt("أدخل رمز الدخول السري:");
        if(pin === "1234") openPage('adminPage');
        else alert("الرمز خطأ!");
    }

    function addProduct() {
        const n = document.getElementById('pName').value, p = document.getElementById('pPrice').value, c = document.getElementById('pCat').value, d = document.getElementById('pDesc').value;
        if(n && p) { db.ref('products').push({name: n, price: parseFloat(p), category: c, description: d}); alert("تم الإضافة!"); }
    }

    function renderAdminList() {
        const list = document.getElementById('adminList'); list.innerHTML = '<h4>المنتجات الحالية:</h4>';
        Object.keys(productsData).forEach(key => {
            list.innerHTML += `<div style="background:#222; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${productsData[key].name}</span>
                <button onclick="db.ref('products/${key}').remove()" style="background:red; border:none; color:white; padding:5px; border-radius:5px;">حذف</button>
            </div>`;
        });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
