<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات والمؤثرات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        .ripple { position: relative; overflow: hidden; }
        .ripple:after {
            content: ""; display: block; position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat; background-position: 50%; transform: scale(10, 10);
            opacity: 0; transition: transform .5s, opacity 1s;
        }
        .ripple:active:after { transform: scale(0, 0); opacity: .3; transition: 0s; }

        /* --- الهيدر --- */
        header {
            position: fixed; top: 10px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000;
        }
        
        .header-center {
            position: absolute; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center;
        }

        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge { position: absolute; top: -5px; right: -8px; background: red; color: white; font-size: 11px; width: 18px; height: 18px; border-radius: 50%; display: flex; justify-content: center; align-items: center; }

        /* --- القائمة الجانبية --- */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37;
        }
        #side-menu.active { right: 0; }
        .menu-logo-container { width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%; border: 2px solid #d4af37; overflow: hidden; }
        .menu-logo { width: 100%; height: 100%; object-fit: cover; }

        /* --- المحتوى --- */
        #main-content { padding-top: 100px; }
        .hero-banner { width: 92%; margin: 0 auto 30px; display: block; border-radius: 20px; border: 1px solid #222; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 30px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; border: 1px solid #1a1a1a; aspect-ratio: 2/1; object-fit: cover; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.2rem; }

        /* --- صفحة المنتجات --- */
        #section-view { display: none; padding: 100px 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; aspect-ratio: 1/1; object-fit: cover; margin-bottom: 8px; }

        /* --- المودال --- */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 92vh;
            background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37;
            border-radius: 25px 25px 0 0; transition: 0.4s; padding: 25px 20px; overflow-y: auto;
        }
        .modal.active { bottom: 0; }
        .variant-box { background: #111; padding: 15px; border-radius: 12px; margin: 15px 0; border: 1px solid #222; }
        .variant-option { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; cursor: pointer; }
        .variant-option input { accent-color: #d4af37; width: 18px; height: 18px; }
        .custom-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; margin-top: 10px; font-family: 'Cairo'; }
        
        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 1rem; cursor: pointer; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
        .warning-text { color: #ff4d4d; font-weight: bold; margin: 10px 0; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-icon ripple" onclick="toggleMenu()">&#9776;</div>
        <div class="header-center">
            <div class="header-title" id="main-title">متجر أومني</div>
            <div class="back-btn ripple" id="back-btn" onclick="goHome()">&#8594;</div>
        </div>
        <div class="cart-wrapper ripple" onclick="toggleCart()" style="position:relative;">
            <div class="nav-icon">🛒</div>
            <div class="cart-badge" id="cart-count">0</div>
        </div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <div class="menu-logo-container"><img src="لوقو المتجر.png" class="menu-logo"></div>
        <ul style="list-style:none;">
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="goHome(); closeAll();">🏠 الرئيسية</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الترفيه'); closeAll();">🍿 قسم الترفيه</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم انستا'); closeAll();">📸 قسم انستقرام</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم تيك توك'); closeAll();">📱 قسم تيك توك</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم ستيم أوفلاين'); closeAll();">🕹️ ستيم أوفلاين</li>
            <li class="ripple" style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الذكاء الاصطناعي'); closeAll();">🤖 الذكاء الاصطناعي</li>
            <li class="ripple" style="padding:15px;"><a href="https://wa.me/966548512295" style="color:#25d366; text-decoration:none;">💬 تواصل واتساب</a></li>
        </ul>
    </div>

    <div id="product-detail-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <div id="detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <h2 style="color:#d4af37; margin-bottom:20px;">سلة المشتريات</h2>
        <div class="variant-box">
            <input type="text" id="user-name" class="custom-input" placeholder="الاسم (إجباري)">
            <input type="tel" id="user-phone" class="custom-input" placeholder="رقم الهاتف (إجباري)">
        </div>
        <div id="cart-items"></div>
        <div style="margin:20px 0; font-size:1.2rem; color:#d4af37; font-weight:bold;">المجموع: <span id="cart-total">0</span> ريال</div>
        <button class="btn-main ripple" onclick="checkout()">تأكيد عبر واتساب</button>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item ripple" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.png"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم انستا')"><img src="قسم انستا .png"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .png"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم ستيم أوفلاين')"><img src="قسم ستيم اوفلاين.png"><div class="cat-label">ستيم أوفلاين</div></div>
            <div class="cat-item ripple" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .png"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title" style="text-align:center; color:#d4af37; margin-bottom:20px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQjyV07I",
            authDomain: "omnistore-a5251.firebaseapp.com",
            databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
            projectId: "omnistore-a5251",
            storageBucket: "omnistore-a5251.appspot.com",
            messagingSenderId: "542087784992",
            appId: "1:542087784992:web:8a83435b3ef36678c3aa45"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allProducts = {};
        let cart = [];

        // سحب المنتجات من Firebase فوراً
        onValue(ref(db, 'products'), (snapshot) => {
            allProducts = snapshot.val() || {};
            console.log("المنتجات المحدثة:", allProducts);
        });

        window.openSection = function(categoryName) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('sec-title').innerText = categoryName;

            const list = document.getElementById('products-list');
            list.innerHTML = '';

            let found = false;
            for (let id in allProducts) {
                const p = allProducts[id];
                if (p.category === categoryName) {
                    found = true;
                    list.innerHTML += `
                        <div class="product-card ripple" onclick="showProductDetails('${id}')">
                            <img src="${p.image || 'logo.png'}">
                            <h3>${p.name}</h3>
                            <div style="color:#d4af37;">${p.price} ريال</div>
                        </div>`;
                }
            }
            if(!found) list.innerHTML = '<p style="text-align:center; width:100%;">لا توجد منتجات في هذا القسم حالياً.</p>';
            window.scrollTo(0,0);
        };

        window.showProductDetails = function(id) {
            const p = allProducts[id];
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <img src="${p.image || ''}" style="width:100%; border-radius:15px; margin-bottom:15px;">
                <h2>${p.name}</h2>
                <div style="font-size:1.5rem; color:#d4af37; font-weight:900; margin:10px 0;">${p.price} ريال</div>
                <div style="color:#ccc; font-size:0.9rem; line-height:1.6;">${p.description}</div>
                <button class="btn-main ripple" style="margin-top:20px;" onclick="addToCart('${id}')">إضافة للسلة 🛒</button>
            `;
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        };

        window.addToCart = function(id) {
            const p = allProducts[id];
            cart.push(p);
            updateCartUI();
            alert("تمت الإضافة!");
            closeAll();
        };

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach((item) => {
                total += parseFloat(item.price);
                list.innerHTML += `<div style="padding:10px 0; border-bottom:1px solid #222;">
                    <b>${item.name}</b> - <span style="color:#d4af37;">${item.price} ريال</span>
                </div>`;
            });
            document.getElementById('cart-total').innerText = total.toFixed(2);
        }

        window.checkout = function() {
            if(cart.length === 0) return alert('السلة فارغة!');
            const name = document.getElementById('user-name').value;
            const phone = document.getElementById('user-phone').value;
            if(!name || !phone) return alert('أدخل بياناتك!');

            let msg = `*طلب جديد من متجر أومني*\nالاسم: ${name}\nالهاتف: ${phone}\n\n*الطلبات:*\n`;
            cart.forEach(i => msg += `- ${i.name} (${i.price} ريال)\n`);
            msg += `\n*المجموع: ${document.getElementById('cart-total').innerText} ريال*`;

            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        };

        window.goHome = function() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('main-title').style.display = 'flex';
        };

        window.toggleMenu = () => { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; };
        window.toggleCart = () => { document.getElementById('cart-modal').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; };
        window.closeAll = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        };
    </script>
</body>
</html>
