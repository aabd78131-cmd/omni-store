<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --black: #050505; --dark: #111; }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body { background: var(--black); color: white; overflow-x: hidden; }

        /* شاشة الدخول (5 ثواني) */
        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 1s ease-out;
        }
        .intro-logo { width: 120px; border-radius: 50%; animation: pulse 1.5s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 10px var(--gold); } 50% { transform: scale(1.1); box-shadow: 0 0 30px var(--gold); } }

        /* الهيدر */
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .logo-header { width: 40px; border-radius: 50%; }

        /* نظام الصفحات المعزولة */
        .page-view { display: none; padding: 20px; max-width: 1200px; margin: auto; animation: slideIn 0.5s ease-out forwards; }
        .page-view.active { display: block; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* تصميم الصفحة الرئيسية */
        .banner-img { width: 100%; border-radius: 20px; border: 1px solid var(--gold); margin-bottom: 30px; }
        
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .cat-btn {
            background: var(--dark); border: 1px solid rgba(212,175,55,0.3); padding: 30px;
            border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .cat-btn:hover { background: rgba(212,175,55,0.1); border-color: var(--gold); transform: translateY(-5px); }
        .cat-btn i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }
        .cat-btn h3 { color: white; font-size: 1.2rem; }

        /* تصميم صفحة المنتجات (الداخلية) */
        .back-btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { background: var(--gold); color: black; }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .product-card { background: var(--dark); border: 1px solid #333; border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; }
        .product-card:hover { border-color: var(--gold); }
        .product-card h4 { color: var(--gold); font-size: 1.3rem; margin-bottom: 10px; }
        .price { font-size: 1.5rem; font-weight: bold; margin: 15px 0; }
        .buy-btn { background: var(--gold); color: black; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

    </style>
</head>
<body>

    <div id="intro">
        <img src="لوقو متجر اومني .jpeg" class="intro-logo" alt="OMNI">
        <h2 style="color: var(--gold);">جاري الدخول لعالم أومني...</h2>
    </div>

    <header>
        <img src="لوقو متجر اومني .jpeg" class="logo-header" alt="OMNI">
        <h3 style="color: var(--gold); margin: 0;">أومني ستور</h3>
        <button style="background: var(--gold); color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;" onclick="alert('سيتم تفعيل نظام الدخول الحقيقي قريباً')">دخول / تسجيل</button>
    </header>

    <div id="home-page" class="page-view active">
        <img src="اومني القائمه الاوله.jpeg" class="banner-img" alt="عروض أومني">
        
        <h2 style="margin-bottom: 20px; color: #ccc;">تصفح الأقسام</h2>
        <div class="categories-grid">
            <div class="cat-btn" onclick="openPage('ai-page')">
                <i class="fas fa-robot"></i>
                <h3>أدوات الذكاء الاصطناعي</h3>
            </div>
            <div class="cat-btn" onclick="openPage('entertainment-page')">
                <i class="fas fa-film"></i>
                <h3>ترفيه بلا حدود</h3>
            </div>
            <div class="cat-btn" onclick="openPage('social-page')">
                <i class="fas fa-rocket"></i>
                <h3>دعم السوشيال ميديا</h3>
            </div>
        </div>
    </div>

    <div id="ai-page" class="page-view">
        <button class="back-btn" onclick="openPage('home-page')"><i class="fas fa-arrow-right"></i> عودة للرئيسية</button>
        <h2 style="color: var(--gold); margin-bottom: 25px;"><i class="fas fa-robot"></i> قسم الذكاء الاصطناعي</h2>
        
        <div class="products-grid">
            <div class="product-card">
                <h4>اشتراك ChatGPT Plus</h4>
                <p>حساب خاص لمدة شهر كامل</p>
                <div class="price">80 ر.س</div>
                <button class="buy-btn">شراء الآن</button>
            </div>
            <div class="product-card">
                <h4>اشتراك Midjourney</h4>
                <p>توليد صور احترافية</p>
                <div class="price">120 ر.س</div>
                <button class="buy-btn">شراء الآن</button>
            </div>
        </div>
    </div>

    <div id="entertainment-page" class="page-view">
        <button class="back-btn" onclick="openPage('home-page')"><i class="fas fa-arrow-right"></i> عودة للرئيسية</button>
        <h2 style="color: var(--gold); margin-bottom: 25px;"><i class="fas fa-film"></i> ترفيه بلا حدود</h2>
        
        <div class="products-grid">
            <div class="product-card">
                <h4>نتفليكس أعلى باقة</h4>
                <p>ملف خاص بدقة 4K</p>
                <div class="price">30 ر.س</div>
                <button class="buy-btn">شراء الآن</button>
            </div>
        </div>
    </div>

    <script>
        // إزالة مؤثر البداية بعد 5 ثواني بالضبط
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro').style.opacity = '0';
                setTimeout(() => document.getElementById('intro').style.display = 'none', 1000);
            }, 5000);
        };

        // دالة الانتقال بين الصفحات (تخفي كل شيء وتظهر القسم المطلوب بأنيميشن)
        function openPage(pageId) {
            document.querySelectorAll('.page-view').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
