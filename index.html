<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني - عالمك الرقمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c7a13c; --black: #000; --dark: #111; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: white; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; }
        
        /* شاشة الدخول */
        #authOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: var(--dark); padding: 30px; border-radius: 25px; border: 2px solid var(--gold); width: 85%; max-width: 380px; text-align: center; }
        .logo-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); margin-bottom: 15px; }
        .login-card input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; font-size: 16px; box-sizing: border-box; }
        .login-card button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; font-size: 18px; color: #000; cursor: pointer; }

        /* زر الترس */
        #settingsBtn { position: fixed; top: 20px; right: 20px; z-index: 5000; font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        
        /* القائمة الجانبية */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 300px; height: 100%; background: var(--dark); z-index: 6000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-sizing: border-box; border-left: 3px solid var(--gold); overflow-y: auto; }
        #sideMenu.active { right: 0; }
        .menu-header { text-align: center; margin-bottom: 20px; }
        .close-menu-btn { background: #333; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 15px; font-weight: bold; border: 1px solid #444; }
        .menu-section-title { color: #888; font-size: 14px; margin: 20px 0 10px 0; text-align: right; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .menu-item { padding: 12px; border-radius: 8px; cursor: pointer; color: var(--gold); font-weight: bold; font-size: 16px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .menu-item:active { background: #1a1a1a; }

        /* الشاشة الرئيسية */
        .hero-section { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: pointer; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* طبقة الأزرار للجوال */
        .touch-grid { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; }
        .touch-grid button { position: absolute; background: transparent; border: none; outline: none; -webkit-tap-highlight-color: transparent; cursor: pointer; z-index: 2001; }

        /* الصفحات الداخلية */
        .full-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--black); z-index: 8000; overflow-y: auto; }
        .header-fixed { position: sticky; top: 0; background: var(--dark); padding: 15px 20px; border-bottom: 2px solid var(--gold); display: flex; align-items: center; z-index: 8100; }
        .back-btn { background: var(--gold); color: #000; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-left: 15px; }

        /* التبديل بين الأجهزة */
        .pc-view { display: block; }
        .mobile-view { display: none; }
        @media (max-width: 768px) { .pc-view { display: none; } .mobile-view { display: block; } }

        /* تنسيقات البطاقات */
        .item-card { background: var(--dark); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="authOverlay">
    <div class="login-card">
        <img src="لوقو متجر اومني .jpeg" class="logo-img" alt="Logo">
        <h2 style="color:var(--gold); margin:0 0 20px 0;">أومني - الواجهة الرقمية</h2>
        <input type="text" id="userName" placeholder="الاسم الكريم">
        <input type="tel" id="userPhone" placeholder="رقم الجوال">
        <button onclick="handleLogin()">دخول المتجر</button>
    </div>
</div>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>

<div id="sideMenu">
    <button class="close-menu-btn" onclick="toggleMenu()">إغلاق القائمة ✖</button>
    <div class="menu-header">
        <img src="لوقو متجر اومني .jpeg" style="width:70px; height:70px; border-radius:50%; border:1px solid var(--gold);">
    </div>
    
    <div class="menu-section-title">أقسام المتجر</div>
    <div class="menu-item" onclick="loadCategory('all', 'جميع المنتجات')">📦 جميع المنتجات</div>
    <div class="menu-item" onclick="loadCategory('entertainment', 'قسم الترفيه')">🎬 قسم الترفيه</div>
    <div class="menu-item" onclick="loadCategory('ai', 'الذكاء الاصطناعي')">🤖 الذكاء الاصطناعي</div>
    <div class="menu-item" onclick="loadCategory('social', 'السوشال ميديا')">🚀 السوشال ميديا</div>
    <div class="menu-item" onclick="loadCategory('cards', 'البطاقات الرقمية')">💳 البطاقات</div>

    <div class="menu-section-title">إدارة الحساب</div>
    <div class="menu-item" onclick="openPage('cartPage')">🛒 سلة المشتريات</div>
    <div class="menu-item" onclick="openPage('reviewsPage')">⭐ التقييمات</div>
    <div class="menu-item" onclick="window.open('https://wa.me/966548512295')">💬 الدعم الفني</div>
    <div class="menu-item" onclick="logout()" style="color: #ff4444; margin-top: 20px;">🚪 تسجيل خروج</div>
</div>

<div class="hero-section mobile-view" onclick="loadCategory('all', 'جميع الخدمات')">
    <img src="صوره القائمه الرئيسيه للجوال.jpeg" class="hero-img">
    <div class="touch-grid" onclick="event.stopPropagation()">
        <button style="top:34%; left:5%; width:45%; height:18%;" onclick="loadCategory('entertainment', 'قسم الترفيه')"></button>
        <button style="top:53%; left:5%; width:45%; height:18%;" onclick="loadCategory('ai', 'الذكاء الاصطناعي')"></button>
        <button style="top:72%; left:5%; width:44%; height:18%;" onclick="loadCategory('social', 'دعم السوشال ميديا')"></button>
        <button style="top:72%; left:51%; width:44%; height:18%;" onclick="loadCategory('cards', 'البطاقات الرقمية')"></button>
    </div>
</div>

<div class="hero-section pc-view" onclick="loadCategory('all', 'جميع الخدمات')">
    <img src="اومني القائمه الاوله.jpeg" class="hero-img">
    <div class="touch-grid" style="display:block;" onclick="event.stopPropagation()">
        <button style="top:75%; left:5%; width:20%; height:15%;" onclick="loadCategory('entertainment', 'الترفيه')"></button>
        <button style="top:75%; left:28%; width:20%; height:15%;" onclick="loadCategory('ai', 'الذكاء الاصطناعي')"></button>
        <button style="top:75%; left:52%; width:20%; height:15%;" onclick="loadCategory('social', 'السوشال ميديا')"></button>
        <button style="top:75%; left:75%; width:20%; height:15%;" onclick="loadCategory('cards', 'البطاقات')"></button>
    </div>
</div>

<div class="full-page" id="productsPage">
    <div class="header-fixed">
        <button class="back-btn" onclick="closePages()">🔙 عودة</button>
        <h3 id="catTitle" style="color:var(--gold); margin:0;"></h3>
    </div>
    <div id="productList" style="padding: 20px; padding-bottom: 100px;"></div>
</div>

<div class="full-page" id="reviewsPage">
    <div class="header-fixed"><button class="back-btn" onclick="closePages()">🔙</button><h3 style="color:var(--gold); margin:0;">التقييمات</h3></div>
    <div id="reviewsList" style="padding:20px;"></div>
</div>

<div class="full-page" id="cartPage">
    <div class="header-fixed"><button class="back-btn" onclick="closePages()">🔙</button><h3 style="color:var(--gold); margin:0;">السلة</h3></div>
    <div id="cartItems" style="padding:20px;"></div>
    <div style="position:fixed; bottom:0; width:100%; background:var(--dark); padding:20px; border-top:2px solid var(--gold); box-sizing:border-box;">
        <button onclick="checkout()" style="width:100%; padding:18px; background:var(--gold); color:black; border:none; border-radius:12px; font-weight:bold; font-size:18px;">تأكيد الطلب واتساب 👑</button>
    </div>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let cart = [];
    let productsData = [];

    window.onload = () => {
        if(localStorage.getItem('omni_logged')) document.getElementById('authOverlay').style.display = 'none';
        db.ref('products').on('value', s => { productsData = Object.values(s.val() || {}); });
    };

    function handleLogin() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        if(name && phone) {
            db.ref('users/' + phone).set({name, phone, date: new Date().toISOString()});
            localStorage.setItem('omni_logged', 'true');
            document.getElementById('authOverlay').style.display = 'none';
        }
    }

    function toggleMenu() { document.getElementById('sideMenu').classList.toggle('active'); }

    function openPage(id) {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.getElementById('settingsBtn').style.display = 'none'; // إخفاء الترس فوراً
        document.getElementById('sideMenu').classList.remove('active');
    }

    function closePages() {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById('settingsBtn').style.display = 'flex'; // إعادة الترس فقط في الرئيسية
    }

    function loadCategory(cat, title) {
        document.getElementById('catTitle').innerText = title;
        const list = document.getElementById('productList');
        list.innerHTML = '';
        const filtered = (cat === 'all') ? productsData : productsData.filter(p => p.category === cat);
        
        if(filtered.length === 0) {
            list.innerHTML = '<p style="text-align:center; color:#666;">سيتم إضافة المنتجات قريباً...</p>';
        }

        filtered.forEach(p => {
            list.innerHTML += `
                <div class="item-card">
                    <div><h4 style="margin:0;">${p.name}</h4><span style="color:var(--gold)">${p.price} ريال</span></div>
                    <button style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;" onclick="addToCart('${p.name}', ${p.price})">إضافة</button>
                </div>`;
        });
        openPage('productsPage');
    }

    function addToCart(name, price) {
        cart.push({name, price});
        alert("تمت الإضافة للسلة ✅");
        updateCartUI();
    }

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        container.innerHTML = '';
        cart.forEach((item, index) => {
            container.innerHTML += `<div class="item-card"><span>${item.name}</span><button onclick="cart.splice(${index},1);updateCartUI();" style="background:red; color:white; border:none; padding:5px 10px; border-radius:5px;">حذف</button></div>`;
        });
    }

    function checkout() {
        if(cart.length === 0) return alert("السلة فارغة");
        let msg = "طلب جديد:\n";
        cart.forEach(i => msg += `- ${i.name}\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>

</body>
</html>
