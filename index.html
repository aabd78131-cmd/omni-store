<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni Store - المتجر الرسمي</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --gold: #c7a13c; --black: #000; --dark: #121212; --gray: #252525; --red: #ff4d4d; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow-x: hidden; }

        /* إصلاح الترس الثابت */
        #settingsBtn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.7); border: 2px solid var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 9999; cursor: pointer; transition: 0.3s; }
        #settingsBtn:hover { transform: rotate(45deg); background: var(--gold); color: #000; }

        /* شاشة الدخول */
        #authOverlay { position: fixed; inset: 0; background: var(--black); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--dark); padding: 40px 30px; border-radius: 30px; border: 2px solid var(--gold); width: 85%; max-width: 400px; text-align: center; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 12px; text-align: center; box-sizing: border-box; outline: none; }
        .login-box button { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: #000; }

        /* القائمة الجانبية */
        #sideMenu { position: fixed; top: 0; right: -320px; width: 280px; height: 100%; background: var(--dark); z-index: 95000; transition: 0.4s; padding: 20px; box-sizing: border-box; border-left: 2px solid var(--gold); }
        #sideMenu.active { right: 0; }
        .menu-logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--gold); display: block; margin: 20px auto; }
        .menu-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; gap: 15px; }

        /* كروت المنتجات */
        .card { background: var(--dark); border-radius: 20px; border: 1px solid #222; margin: 15px; overflow: hidden; display: flex; flex-direction: column; cursor: pointer; }
        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .out-of-stock { opacity: 0.3; filter: grayscale(1); pointer-events: none; }

        /* نافذة الوصف */
        #detailsModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 90000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--dark); border: 2px solid var(--gold); border-radius: 25px; width: 100%; max-width: 450px; overflow: hidden; }
        .modal-img { width: 100%; height: 200px; object-fit: cover; }
        .modal-info { padding: 20px; }

        /* السلة */
        #floatingCart { position: fixed; bottom: 30px; left: 25px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 88888; cursor: pointer; }
        .cart-count { position: absolute; top: -5px; right: -5px; background: red; color: white; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; }

        .page { display: none; position: fixed; inset: 0; background: var(--black); z-index: 80000; overflow-y: auto; padding-bottom: 100px; }
        .hero img { width: 100%; height: 100vh; object-fit: cover; }
    </style>
</head>
<body>

<div id="settingsBtn" onclick="toggleMenu()">⚙️</div>
<div id="menuOverlay" onclick="toggleMenu()" style="position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:94000; display:none;"></div>

<div id="authOverlay">
    <div class="login-box">
        <img src="لوقو متجر اومني .jpeg" style="width:70px; border-radius:50%; margin-bottom:15px; border:2px solid var(--gold);">
        <h2 style="color:var(--gold); margin:0;">أهلاً بك</h2>
        <input type="text" id="regName" placeholder="الاسم الكريم">
        <input type="tel" id="regPhone" placeholder="رقم الجوال">
        <button onclick="saveSession()">دخول المتجر</button>
    </div>
</div>

<div id="floatingCart" onclick="openPage('cartPage')">🛒<div class="cart-count" id="cartBadge">0</div></div>

<div id="sideMenu">
    <img src="لوقو متجر اومني .jpeg" class="menu-logo">
    <div id="displayUser" style="text-align:center; color:var(--gold); margin-bottom:20px;"></div>
    <div class="menu-item" onclick="loadProducts('all', '📦 المنتجات')">📦 الكل</div>
    <div class="menu-item" onclick="loadProducts('entertainment', '🎬 ترفيه')">🎬 ترفيه</div>
    <div class="menu-item" onclick="loadProducts('ai', '🤖 ذكاء اصطناعي')">🤖 ذكاء اصطناعي</div>
    <hr style="border-color:#333;">
    <div class="menu-item" onclick="logout()" style="color:var(--red);">🚪 خروج</div>
</div>

<div class="hero"><img src="صوره القائمه الرئيسيه للجوال.jpeg" onclick="loadProducts('all', '📦 جميع الخدمات')"></div>

<div class="page" id="productsPage">
    <div style="padding:15px; background:var(--dark); border-bottom:1px solid var(--gold); display:flex; align-items:center;">
        <button onclick="closeAll()" style="background:var(--gold); border:none; padding:8px 12px; border-radius:8px;">🔙</button>
        <h3 id="pageTitle" style="margin-right:15px; color:var(--gold);"></h3>
    </div>
    <div id="productsGrid"></div>
</div>

<div id="detailsModal">
    <div class="modal-content">
        <img id="mImg" class="modal-img">
        <div class="modal-info">
            <h2 id="mTitle" style="color:var(--gold); margin-top:0;"></h2>
            <p id="mDesc" style="color:#bbb; font-size:14px; white-space:pre-line;"></p>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span id="mPrice" style="color:var(--gold); font-weight:bold; font-size:20px;"></span>
                <button id="mAddBtn" style="background:var(--gold); padding:10px 20px; border:none; border-radius:10px; font-weight:bold;">إضافة للسلة</button>
            </div>
            <button onclick="document.getElementById('detailsModal').style.display='none'" style="width:100%; margin-top:15px; background:none; border:1px solid #444; color:#666; padding:5px;">إغلاق</button>
        </div>
    </div>
</div>

<div class="page" id="cartPage">
    <div style="padding:20px;"><button onclick="closeAll()">🔙 عودة</button></div>
    <div id="cartGrid"></div>
    <div style="padding:20px; background:#151515; margin:15px; border-radius:15px;">
        <input type="email" id="userEmail" placeholder="الإيميل (اختياري)" style="width:100%; padding:12px; background:#000; color:white; border:1px solid #333; border-radius:10px; text-align:center;">
    </div>
    <button onclick="sendOrder()" style="width:90%; display:block; margin:auto; padding:18px; background:var(--gold); border:none; border-radius:12px; font-weight:bold;">تأكيد الطلب ✅</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myCart = [], productsData = {};

    window.onload = () => {
        const u = localStorage.getItem('omni_user');
        if(u) { document.getElementById('authOverlay').style.display = 'none'; document.getElementById('displayUser').innerText = "مرحباً، " + u; }
        db.ref('products').on('value', s => { productsData = s.val() || {}; });
    };

    function saveSession() {
        const n = document.getElementById('regName').value, p = document.getElementById('regPhone').value;
        if(n && p) { localStorage.setItem('omni_user', n); localStorage.setItem('omni_phone', p); location.reload(); }
    }

    function toggleMenu() {
        const m = document.getElementById('sideMenu');
        m.classList.toggle('active');
        document.getElementById('menuOverlay').style.display = m.classList.contains('active') ? 'block' : 'none';
    }

    function openPage(id) { 
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        toggleMenu();
    }

    function closeAll() { document.querySelectorAll('.page').forEach(p => p.style.display = 'none'); }

    function loadProducts(cat, title) {
        document.getElementById('pageTitle').innerText = title;
        const grid = document.getElementById('productsGrid'); grid.innerHTML = '';
        Object.keys(productsData).forEach(key => {
            const p = productsData[key];
            if(cat === 'all' || p.category === cat) {
                const isOut = p.inStock === false;
                grid.innerHTML += `
                    <div class="card ${isOut?'out-of-stock':''}" onclick="showDetails('${key}')">
                        <img src="${p.img || 'https://via.placeholder.com/400x180'}" class="card-img">
                        <div class="card-body">
                            <div><b>${p.name}</b><br><span style="color:var(--gold)">${p.price} ريال</span></div>
                            <button onclick="event.stopPropagation(); addToCart('${p.name}', ${p.price})" style="background:var(--gold); border:none; padding:10px; border-radius:10px;">➕</button>
                        </div>
                    </div>`;
            }
        });
        openPage('productsPage');
    }

    function showDetails(key) {
        const p = productsData[key];
        document.getElementById('mImg').src = p.img || '';
        document.getElementById('mTitle').innerText = p.name;
        document.getElementById('mDesc').innerText = p.description || "";
        document.getElementById('mPrice').innerText = p.price + " ريال";
        document.getElementById('mAddBtn').onclick = () => { addToCart(p.name, p.price); document.getElementById('detailsModal').style.display='none'; };
        document.getElementById('detailsModal').style.display = 'flex';
    }

    function addToCart(n, p) {
        myCart.push({n, p});
        document.getElementById('cartBadge').innerText = myCart.length;
        updateCart();
    }

    function updateCart() {
        const grid = document.getElementById('cartGrid'); grid.innerHTML = ''; let total = 0;
        myCart.forEach((item, i) => { total += item.p; grid.innerHTML += `<div class="card" style="padding:15px; flex-direction:row; justify-content:space-between; align-items:center;"><span>${item.n}</span><button onclick="myCart.splice(${i},1);updateCart();" style="color:red; background:none; border:none;">حذف</button></div>`; });
        grid.innerHTML += `<h3 style="text-align:center; color:var(--gold);">الإجمالي: ${total} ريال</h3>`;
    }

    function sendOrder() {
        if(myCart.length === 0) return;
        const u = localStorage.getItem('omni_user'), p = localStorage.getItem('omni_phone'), e = document.getElementById('userEmail').value;
        const orderData = { user: u, phone: p, email: e, items: myCart, time: new Date().toLocaleString() };
        db.ref('orders').push(orderData);
        let t = `طلب جديد:\n👤 ${u}\n📱 ${p}\n`;
        myCart.forEach(i => t += `- ${i.n} (${i.p} ريال)\n`);
        window.open(`https://wa.me/966548512295?text=${encodeURIComponent(t)}`);
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
