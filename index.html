<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>متجر أومني | OMNI STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- الأساسيات --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* --- الهيدر --- */
        header {
            position: fixed; top: 10px; left: 5%; width: 90%; height: 60px;
            background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .header-title { color: #d4af37; font-weight: 900; font-size: 1.1rem; }
        .nav-icon { font-size: 26px; color: #d4af37; cursor: pointer; }
        .back-btn { font-size: 26px; color: #fff; cursor: pointer; display: none; }
        .cart-badge {
            position: absolute; top: -5px; right: -8px; background: red; color: white;
            font-size: 11px; width: 18px; height: 18px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        /* --- القائمة الجانبية --- */
        #side-menu {
            position: fixed; top: 0; right: -100%; width: 80%; height: 100vh;
            background: rgba(5, 5, 5, 0.98); backdrop-filter: blur(15px);
            z-index: 2000; transition: 0.4s; padding: 30px 20px; border-left: 2px solid #d4af37;
        }
        #side-menu.active { right: 0; }
        .menu-logo { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #d4af37; display: block; margin: 0 auto 15px; object-fit: cover; }

        /* --- الأقسام والمنتجات --- */
        #main-content { padding-top: 85px; }
        .hero-banner { width: 92%; margin: 0 auto 25px; display: block; border-radius: 20px; border: 1px solid #222; }
        .container { padding: 0 15px 50px; }
        .cat-item { margin-bottom: 25px; text-align: center; cursor: pointer; }
        .cat-item img { width: 100%; border-radius: 20px; aspect-ratio: 2/1; object-fit: cover; border: 1px solid #1a1a1a; }
        .cat-label { color: #d4af37; font-weight: bold; margin-top: 10px; font-size: 1.2rem; }

        #section-view { display: none; padding: 0 15px 50px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { background: #111; border: 1px solid #222; border-radius: 15px; padding: 10px; text-align: center; cursor: pointer; }
        .product-card img { width: 100%; border-radius: 10px; margin-bottom: 8px; aspect-ratio: 1/1; object-fit: cover; }
        .product-card h3 { font-size: 0.9rem; margin-bottom: 5px; height: 40px; overflow: hidden; }

        /* --- نافذة تفاصيل المنتج --- */
        .modal {
            position: fixed; bottom: -100%; left: 0; width: 100%; max-height: 90vh;
            background: #0a0a0a; z-index: 3000; border-top: 2px solid #d4af37;
            border-radius: 25px 25px 0 0; transition: 0.4s; padding: 20px; overflow-y: auto;
        }
        .modal.active { bottom: 0; }
        .detail-img { width: 100%; border-radius: 15px; border: 1px solid #222; margin-bottom: 15px; }
        .detail-price { color: #d4af37; font-size: 1.5rem; font-weight: 900; margin-bottom: 10px; }
        .detail-desc { color: #ccc; font-size: 0.9rem; line-height: 1.6; background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .detail-reviews { border-top: 1px solid #222; padding-top: 15px; margin-bottom: 20px; }
        .rev-item { font-size: 0.85rem; color: #aaa; margin-bottom: 8px; border-bottom: 1px solid #151515; padding-bottom: 5px; }

        /* --- السلة --- */
        .email-box { background: #111; padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid #333; }
        .email-box input { width: 100%; padding: 10px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; margin-top: 8px; font-family: 'Cairo'; }

        .btn-main { background: #d4af37; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-family: 'Cairo'; font-size: 1rem; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1500; display: none; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="nav-icon" onclick="toggleMenu()">&#8942;</div>
            <div class="cart-wrapper" onclick="toggleCart()" style="position:relative;">
                <div class="nav-icon">🛒</div>
                <div class="cart-badge" id="cart-count">0</div>
            </div>
        </div>
        <div class="header-title" id="main-title">متجر أومني</div>
        <div class="back-btn" id="back-btn" onclick="goHome()">&#8594;</div>
    </header>

    <div id="overlay" onclick="closeAll()"></div>

    <div id="side-menu">
        <img src="لوقو المتجر.jpeg" class="menu-logo" onerror="this.src='https://via.placeholder.com/100/000/d4af37?text=OMNI'">
        <ul style="list-style:none;">
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="goHome(); closeAll();">🏠 الرئيسية</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم تيك توك'); closeAll();">📱 قسم تيك توك</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم انستا'); closeAll();">📸 قسم انستقرام</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الترفيه'); closeAll();">🍿 قسم الترفيه</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم ستيم'); closeAll();">🎮 قسم ستيم</li>
            <li style="padding:15px; border-bottom:1px solid #222;" onclick="openSection('قسم الذكاء الاصطناعي'); closeAll();">🤖 الذكاء الاصطناعي</li>
        </ul>
    </div>

    <div id="product-detail-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <div id="detail-content"></div>
    </div>

    <div id="cart-modal" class="modal">
        <div onclick="closeAll()" style="cursor:pointer; color:#fff; float:left;">✖</div>
        <h2 style="color:#d4af37; margin-bottom:20px;">سلة المشتريات</h2>
        <div id="cart-items"></div>
        <div style="margin:20px 0; font-size:1.2rem; color:#d4af37; font-weight:bold;">المجموع: <span id="cart-total">0</span> ريال</div>
        
        <div class="email-box">
            <label>البريد الإلكتروني (اختياري):</label>
            <input type="email" id="user-email" placeholder="example@gmail.com">
            <p style="font-size:0.75rem; color:#888; margin-top:5px;">* ضعه إذا كان طلبك يتطلب بريد. لن يتم التعويض إذا كان خطأ.</p>
        </div>

        <button class="btn-main" onclick="checkout()">تأكيد الطلب عبر واتساب</button>
    </div>

    <div id="main-content">
        <img src="القائمه الرئيسيه .jpeg" class="hero-banner">
        <div class="container">
            <div class="cat-item" onclick="openSection('قسم تيك توك')"><img src="قسم تيك توك .jpeg"><div class="cat-label">قسم تيك توك</div></div>
            <div class="cat-item" onclick="openSection('قسم الترفيه')"><img src="قسم اشتراكات الترفيه.jpeg"><div class="cat-label">قسم الترفيه</div></div>
            <div class="cat-item" onclick="openSection('قسم انستا')"><img src="قسم انستا .jpeg"><div class="cat-label">قسم انستقرام</div></div>
            <div class="cat-item" onclick="openSection('قسم ستيم')"><img src="قسم ستيم اولاين .jpeg"><div class="cat-label">قسم ستيم</div></div>
            <div class="cat-item" onclick="openSection('قسم الذكاء الاصطناعي')"><img src="قسم الذكاء الاصطناعي .jpeg"><div class="cat-label">الذكاء الاصطناعي</div></div>
        </div>
    </div>

    <div id="section-view">
        <h2 id="sec-title" style="text-align:center; color:#d4af37; margin-bottom:20px;"></h2>
        <div class="product-grid" id="products-list"></div>
    </div>

    <script>
        // --- قاعدة بيانات المنتجات الكاملة ---
        const storeData = {
            'قسم تيك توك': [
                { id: 101, name: '1000 متابع تيك توك', price: 25, img: 'قسم تيك توك .jpeg', desc: 'زيادة متابعين سريعة وآمنة.', reviews: ['سريع جداً'] }
            ],
            'قسم الترفيه': [
                { id: 201, name: 'نتفلكس شهر - شاشة', price: 35, img: 'قسم اشتراكات الترفيه.jpeg', desc: 'شاشة خاصة 4K ضمان كامل المدة.', reviews: ['جودة خرافية'] }
            ],
            'قسم انستا': [
                { id: 301, name: '5000 متابع انستا', price: 40, img: 'قسم انستا .jpeg', desc: 'متابعين جودة عالية.', reviews: ['ثقة'] }
            ],
            'قسم ستيم': [
                { id: 401, name: 'حساب ستيم أونلاين', price: 60, img: 'قسم ستيم اولاين .jpeg', desc: 'حساب ستيم جاهز للعب أونلاين.', reviews: ['الحساب شغال تمام'] },
                { id: 402, name: 'لعبة ستيم أوفلاين', price: 20, img: 'قسم ستيم اوفلاين.jpeg', desc: 'وصول للعبة أوفلاين بسعر رمزي.', reviews: ['تجربة ممتازة'] }
            ],
            'قسم الذكاء الاصطناعي': [
                { id: 501, name: 'اشتراك ChatGPT Plus', price: 85, img: 'قسم الذكاء الاصطناعي .jpeg', desc: 'وصول لكامل مميزات الذكاء الاصطناعي GPT-4.', reviews: ['أفضل اشتراك'] }
            ]
        };

        let cart = [];

        function openSection(name) {
            document.getElementById('main-content').style.display = 'none';
            document.getElementById('section-view').style.display = 'block';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('sec-title').innerText = name;

            const list = document.getElementById('products-list');
            list.innerHTML = '';
            (storeData[name] || []).forEach(p => {
                list.innerHTML += `
                    <div class="product-card" onclick="showProductDetails('${name}', ${p.id})">
                        <img src="${p.img}">
                        <h3>${p.name}</h3>
                        <div style="color:#d4af37; font-weight:bold;">${p.price} ريال</div>
                    </div>
                `;
            });
            window.scrollTo(0,0);
        }

        function showProductDetails(cat, id) {
            const product = storeData[cat].find(p => p.id === id);
            const content = document.getElementById('detail-content');
            
            content.innerHTML = `
                <img src="${product.img}" class="detail-img">
                <h2 style="margin-bottom:5px;">${product.name}</h2>
                <div class="detail-price">${product.price} ريال</div>
                <div style="font-weight:bold; margin-bottom:5px; color:#d4af37;">المواصفات:</div>
                <div class="detail-desc">${product.desc}</div>
                <div class="detail-reviews">
                    <div style="font-weight:bold; margin-bottom:10px;">تقييمات العملاء ⭐:</div>
                    ${product.reviews.map(r => `<div class="rev-item">💬 ${r}</div>`).join('')}
                </div>
                <button class="btn-main" onclick="addToCart(${product.id}, '${product.name}', ${product.price})">أضف للسلة 🛒</button>
            `;
            
            document.getElementById('product-detail-modal').classList.add('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function addToCart(id, name, price) {
            let item = cart.find(i => i.id === id);
            if(item) item.qty++; else cart.push({id, name, price, qty:1});
            updateCart();
            alert('تمت الإضافة!');
            closeAll();
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.reduce((a,b)=>a+b.qty, 0);
            const list = document.getElementById('cart-items');
            list.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += (item.price * item.qty);
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;">
                        <span>${item.name} (x${item.qty})</span>
                        <span>${item.price * item.qty} ر.س</span>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = total;
        }

        function checkout() {
            if(cart.length === 0) return alert('السلة فارغة');
            let email = document.getElementById('user-email').value;
            let msg = `*طلب جديد - متجر أومني*\n\nالطلبات:\n`;
            cart.forEach(i => msg += `- ${i.name} (x${i.qty})\n`);
            msg += `\nالمجموع: ${document.getElementById('cart-total').innerText} ريال`;
            if(email.trim() !== "") msg += `\nالبريد: ${email}`;
            window.open(`https://wa.me/966548512295?text=${encodeURIComponent(msg)}`);
        }

        function goHome() {
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('back-btn').style.display = 'none';
            document.getElementById('main-title').style.display = 'flex';
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('active'); document.getElementById('overlay').style.display = 'block'; updateCart(); }
        function closeAll() {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }
    </script>
</body>
</html>
