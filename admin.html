<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أومني الذهبية | OMNI ADMIN FINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 10px; line-height: 1.6; }
        .admin-container { max-width: 1100px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin: 20px 0; font-weight: 900; text-transform: uppercase; border-bottom: 2px solid var(--gold); display: inline-block; width: 100%; padding-bottom: 10px; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; position: sticky; top: 0; z-index: 100; background: var(--bg); padding: 10px 0; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; cursor: pointer; border-radius: 10px; flex: 1; min-width: 100px; font-weight: bold; font-size: 0.9rem; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }

        .section { display: none; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid #333; margin-bottom: 30px; }
        .section.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; font-size: 1rem; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 5px var(--gold); }

        .btn-main { background: var(--gold); color: black; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.1rem; transition: 0.3s; margin-top: 10px; }
        .btn-main:hover { opacity: 0.8; transform: scale(0.99); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #000; }
        th, td { border: 1px solid #222; padding: 15px; text-align: center; }
        th { background: #1a1a1a; color: var(--gold); font-size: 1rem; }
        
        .inv-img-preview { max-width: 200px; border-radius: 10px; margin-top: 10px; border: 2px solid var(--gold); }

        /* تعديل المنتج */
        .edit-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; justify-content:center; align-items:center; z-index:2000; }
        .edit-modal { background:var(--card); padding:30px; border-radius:20px; width:95%; max-width:600px; border:2px solid var(--gold); max-height: 90vh; overflow-y: auto; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>OMNI STORE ADMIN PANEL</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('add-prod')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('manage-prods')">⚙️ إدارة المنتجات</button>
        <button class="tab-btn" onclick="showTab('record-sale')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('search-order')">🔍 بحث بالرمز</button>
        <button class="tab-btn" onclick="showTab('settings')">🔑 الربط</button>
    </div>

    <div id="add-prod" class="section active">
        <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name"></div>
        <div class="form-group"><label>السعر الأساسي:</label><input type="number" id="p-price"></div>
        <div class="form-group"><label>خيارات المنتج (اختياري - مثال: شهر=20, شهرين=40):</label><textarea id="p-vars"></textarea></div>
        <div class="form-group"><label>رابط الصورة الرئيسية:</label><input type="text" id="p-img"></div>
        <div class="form-group"><label>وصف المنتج:</label><textarea id="p-desc"></textarea></div>
        <button class="btn-main" onclick="saveProduct()">نشر المنتج في المتجر 🚀</button>
    </div>

    <div id="manage-prods" class="section">
        <table id="prods-table">
            <thead><tr><th>المنتج</th><th>السعر</th><th>التحكم</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="record-sale" class="section">
        <div class="form-group"><label>رمز الطلب (#):</label><input type="text" id="s-order-id"></div>
        <div class="form-group"><label>اسم العميل:</label><input type="text" id="s-client-name"></div>
        <div class="form-group"><label>رقم العميل (واتساب):</label><input type="text" id="s-phone"></div>
        <div class="form-group"><label>المنتج المباع:</label><input type="text" id="s-product"></div>
        <div class="form-group"><label>صورة الحوالة (ارفع صورة):</label><input type="file" id="s-invoice" accept="image/*"></div>
        <div class="form-group"><label>ملاحظات إضافية:</label><textarea id="s-notes"></textarea></div>
        <button class="btn-main" onclick="recordSale()">حفظ الطلب نهائياً ✅</button>
    </div>

    <div id="search-order" class="section">
        <div style="margin-bottom:20px;">
            <input type="text" id="search-input" placeholder="أدخل رمز الطلب هنا..." style="margin-bottom:10px;">
            <button class="btn-main" onclick="searchByCode()">بحث سريع 🔍</button>
        </div>
        <div id="search-res"></div>
    </div>

    <div id="settings" class="section">
        <div class="form-group"><label>GitHub Personal Token:</label><input type="password" id="sys-token"></div>
        <button class="btn-main" onclick="saveConfig()" style="background:var(--green)">حفظ التوكن</button>
    </div>
</div>

<div class="edit-overlay" id="editOverlay">
    <div class="edit-modal">
        <h2 style="color:var(--gold); margin-bottom:20px;">تعديل بيانات المنتج</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group"><label>الاسم الجديد:</label><input type="text" id="edit-name"></div>
        <div class="form-group"><label>السعر الجديد:</label><input type="number" id="edit-price"></div>
        <div class="form-group"><label>الخيارات:</label><textarea id="edit-vars"></textarea></div>
        <div class="form-group"><label>رابط الصورة:</label><input type="text" id="edit-img"></div>
        <button class="btn-main" onclick="submitEdit()">تأكيد التعديلات ✅</button>
        <button class="btn-main" style="background:#444; color:white; margin-top:5px;" onclick="closeEdit()">إغلاق</button>
    </div>
</div>

<script>
    const REPO_OWNER = 'aabd78131-cmd';
    const REPO_NAME = 'omni-store';

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'manage-prods') loadManageTable();
    }

    function saveConfig() {
        localStorage.setItem('omni_token', document.getElementById('sys-token').value);
        alert("تم الحفظ بنجاح!");
    }

    // وظيفة المزامنة مع GitHub (قراءة + تعديل + رفع)
    async function syncGitHub(file, actionFunc) {
        const token = localStorage.getItem('omni_token');
        if(!token) return alert("يرجى إدخال التوكن في قسم الإعدادات أولاً!");
        
        try {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${file}`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json();
            
            let content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            let updatedContent = actionFunc(content);

            const updateRes = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Admin Update: ${file}`,
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(updatedContent, null, 2)))),
                    sha: data.sha
                })
            });

            if(updateRes.ok) return true;
        } catch (e) { console.error(e); return false; }
    }

    // إضافة منتج جديد
    async function saveProduct() {
        const product = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            vars: document.getElementById('p-vars').value,
            img: document.getElementById('p-img').value,
            desc: document.getElementById('p-desc').value
        };
        const ok = await syncGitHub('products.json', (data) => { data.push(product); return data; });
        if(ok) alert("تم إضافة المنتج للمتجر!");
    }

    // إدارة المنتجات
    async function loadManageTable() {
        const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/products.json?v=${Date.now()}`);
        const prods = await res.json();
        const tbody = document.querySelector('#prods-table tbody');
        tbody.innerHTML = prods.map(p => `
            <tr>
                <td>${p.name}</td>
                <td>${p.price} ريال</td>
                <td>
                    <button onclick="openEdit(${p.id}, '${p.name}', ${p.price}, '${p.vars}', '${p.img}')" style="background:var(--blue); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer;">تعديل</button>
                    <button onclick="deleteProd(${p.id})" style="background:var(--red); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; margin-right:5px;">حذف</button>
                </td>
            </tr>
        `).join('');
    }

    function openEdit(id, name, price, vars, img) {
        document.getElementById('edit-id').value = id;
        document.getElementById('edit-name').value = name;
        document.getElementById('edit-price').value = price;
        document.getElementById('edit-vars').value = vars;
        document.getElementById('edit-img').value = img;
        document.getElementById('editOverlay').style.display = 'flex';
    }

    function closeEdit() { document.getElementById('editOverlay').style.display = 'none'; }

    async function submitEdit() {
        const id = document.getElementById('edit-id').value;
        const ok = await syncGitHub('products.json', (prods) => {
            const i = prods.findIndex(p => p.id == id);
            prods[i].name = document.getElementById('edit-name').value;
            prods[i].price = document.getElementById('edit-price').value;
            prods[i].vars = document.getElementById('edit-vars').value;
            prods[i].img = document.getElementById('edit-img').value;
            return prods;
        });
        if(ok) { alert("تم التعديل!"); closeEdit(); loadManageTable(); }
    }

    async function deleteProd(id) {
        if(!confirm("هل أنت متأكد من الحذف؟")) return;
        const ok = await syncGitHub('products.json', (prods) => prods.filter(p => p.id != id));
        if(ok) loadManageTable();
    }

    // تسجيل مبيعة مع صورة
    async function recordSale() {
        const file = document.getElementById('s-invoice').files[0];
        let base64Img = "";

        const finishSale = async (img) => {
            const sale = {
                code: document.getElementById('s-order-id').value,
                client: document.getElementById('s-client-name').value,
                phone: document.getElementById('s-phone').value,
                product: document.getElementById('s-product').value,
                notes: document.getElementById('s-notes').value,
                invoice: img,
                date: new Date().toLocaleString('ar-SA')
            };
            const ok = await syncGitHub('sales.json', (data) => { data.push(sale); return data; });
            if(ok) alert("تم حفظ البيعة بنجاح!");
        };

        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => finishSale(reader.result);
        } else { finishSale(""); }
    }

    // بحث بالرمز
    async function searchByCode() {
        const code = document.getElementById('search-input').value;
        const res = await fetch(`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main/sales.json?v=${Date.now()}`);
        const sales = await res.json();
        const found = sales.find(s => s.code == code);
        const div = document.getElementById('search-res');

        if(found) {
            div.innerHTML = `
                <div style="background:#000; padding:20px; border:1px solid var(--gold); border-radius:15px; text-align:right;">
                    <p><b>📦 المنتج:</b> ${found.product}</p>
                    <p><b>👤 العميل:</b> ${found.client}</p>
                    <p><b>📱 واتساب:</b> ${found.phone}</p>
                    <p><b>📅 التاريخ:</b> ${found.date}</p>
                    <p><b>📝 ملاحظات:</b> ${found.notes || 'لا يوجد'}</p>
                    ${found.invoice ? `<p><b>🖼️ الحوالة:</b><br><img src="${found.invoice}" class="inv-img-preview"></p>` : ''}
                </div>
            `;
        } else { div.innerHTML = "<p style='color:red;'>الرمز غير موجود!</p>"; }
    }
</script>
</body>
</html>
