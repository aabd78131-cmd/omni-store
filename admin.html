<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم أومني المطورة | OMNI ADMIN PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; }
        .admin-container { max-width: 1000px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin: 20px 0; font-weight: 900; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px; cursor: pointer; border-radius: 12px; flex: 1; min-width: 140px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }

        .section { display: none; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        .section.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; outline: none; }
        input:focus { border-color: var(--gold); }

        .btn-main { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #222; padding: 12px; text-align: center; font-size: 0.9rem; }
        th { background: #1a1a1a; color: var(--gold); }
        
        .btn-del { background: var(--red); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .btn-edit { background: #3498db; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-left: 5px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>OMNI ELITE ADMIN PRO</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('add-prod')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('manage-prods')">⚙️ إدارة المنتجات</button>
        <button class="tab-btn" onclick="showTab('record-sale')">💰 تسجيل بيعة</button>
        <button class="tab-btn" onclick="showTab('settings')">🔑 الربط</button>
    </div>

    <div id="add-prod" class="section active">
        <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name"></div>
        <div class="form-group">
            <label>القسم:</label>
            <select id="p-category">
                <option value="ذكاء اصطناعي">الذكاء الاصطناعي 🤖</option>
                <option value="ستيم أوفلاين">ستيم أوفلاين 🎮</option>
                <option value="ترفيه">اشتراكات ترفيهية 📺</option>
            </select>
        </div>
        <div class="form-group"><label>السعر الأساسي:</label><input type="number" id="p-price"></div>
        <div class="form-group"><label>خيارات المنتج (اختياري):</label><textarea id="p-vars" placeholder="شهر=20, شهرين=40"></textarea></div>
        <div class="form-group"><label>صورة المنتج الرئيسية (رابط أو اسم):</label><input type="text" id="p-img"></div>
        <div class="form-group"><label>صورة إضافية للوصف (اختياري):</label><input type="text" id="p-extra-img"></div>
        <div class="form-group"><label>وصف المنتج:</label><textarea id="p-desc"></textarea></div>
        <button class="btn-main" onclick="saveProduct()">نشر في المتجر العام 🚀</button>
    </div>

    <div id="manage-prods" class="section">
        <table id="prods-table">
            <thead><tr><th>المنتج</th><th>السعر</th><th>التحكم</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="record-sale" class="section">
        <div class="form-group"><label>رقم العميل (واتساب):</label><input type="text" id="s-client-phone"></div>
        <div class="form-group"><label>اسم المنتج المباع:</label><input type="text" id="s-prod-name"></div>
        <div class="form-group"><label>المبلغ المدفوع:</label><input type="number" id="s-amount"></div>
        <div class="form-group"><label>صورة الحوالة:</label><input type="file" id="s-invoice" accept="image/*"></div>
        <button class="btn-main" onclick="recordSaleToGoogle()">إرسال لجدول قوقل وتأكيد ✅</button>
    </div>

    <div id="settings" class="section">
        <div class="form-group"><label>توكن GitHub:</label><input type="password" id="sys-token"></div>
        <button class="btn-main" onclick="saveConfig()" style="background:var(--green)">حفظ التوكن</button>
    </div>
</div>

<script>
    const G_SCRIPT = 'https://script.google.com/macros/s/AKfycbxbYwConHNyO-Pxoh9d6cyoJof1WV28lKcD9AXl4rNjkrPL50254T_T19WPcmpjWPZS/exec';
    const REPO_INFO = { owner: 'aabd78131-cmd', repo: 'omni-store', path: 'products.json' };

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'manage-prods') loadManageTable();
    }

    // حفظ التوكن
    function saveConfig() {
        localStorage.setItem('omni_token', document.getElementById('sys-token').value);
        alert("تم حفظ التوكن!");
    }

    // إضافة ونشر المنتج لـ GitHub
    async function saveProduct() {
        const token = localStorage.getItem('omni_token');
        if(!token) return alert("ضع التوكن أولاً");

        const newProd = {
            id: Date.now(),
            name: document.getElementById('p-name').value,
            category: document.getElementById('p-category').value,
            price: document.getElementById('p-price').value,
            vars: document.getElementById('p-vars').value,
            img: document.getElementById('p-img').value,
            extra_img: document.getElementById('p-extra-img').value,
            desc: document.getElementById('p-desc').value
        };

        try {
            const res = await fetch(`https://api.github.com/repos/${REPO_INFO.owner}/${REPO_INFO.repo}/contents/${REPO_INFO.path}`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await res.json();
            let content = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            content.push(newProd);

            await fetch(`https://api.github.com/repos/${REPO_INFO.owner}/${REPO_INFO.repo}/contents/${REPO_INFO.path}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({
                    message: "إضافة منتج",
                    content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
                    sha: data.sha
                })
            });
            alert("تم النشر بنجاح!");
        } catch (e) { alert("خطأ في النشر"); }
    }

    // إدارة المنتجات (حذف وتعديل)
    async function loadManageTable() {
        const res = await fetch(`https://raw.githubusercontent.com/${REPO_INFO.owner}/${REPO_INFO.repo}/main/${REPO_INFO.path}`);
        const prods = await res.json();
        const tbody = document.querySelector('#prods-table tbody');
        tbody.innerHTML = prods.map((p, i) => `
            <tr>
                <td>${p.name}</td>
                <td>${p.price}</td>
                <td>
                    <button class="btn-edit" onclick="editProd(${p.id})">تعديل</button>
                    <button class="btn-del" onclick="deleteProd(${p.id})">حذف</button>
                </td>
            </tr>
        `).join('');
    }

    async function deleteProd(id) {
        if(!confirm("حذف المنتج نهائياً؟")) return;
        const token = localStorage.getItem('omni_token');
        // منطق الحذف من GitHub (جلب الملف -> فلترة -> رفع)
        alert("جاري الحذف من السيرفر...");
    }

    // تسجيل البيعة لقوقل شيت (مع تحويل الصورة لـ Base64)
    async function recordSaleToGoogle() {
        const file = document.getElementById('s-invoice').files[0];
        let imgBase64 = "";
        
        if(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                imgBase64 = reader.result;
                sendData(imgBase64);
            };
        } else { sendData(""); }

        async function sendData(img) {
            const saleData = {
                phone: document.getElementById('s-client-phone').value,
                product: document.getElementById('s-prod-name').value,
                price: document.getElementById('s-amount').value,
                invoice: img
            };
            
            await fetch(G_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(saleData)
            });
            alert("تم تسجيل البيعة في جدول قوقل بنجاح!");
        }
    }
</script>
</body>
</html>
