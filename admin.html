<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI ADMIN | لوحة التحكم الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 15px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 25px; font-weight: 900; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        /* Tabs */
        .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 12px 20px; cursor: pointer; border-radius: 12px; font-weight: bold; flex: 1; min-width: 140px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: black; }

        .section { display: none; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms */
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: var(--gold); font-weight: bold; font-size: 0.95rem; }
        input, textarea, select { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .btn-main { background: var(--gold); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 1.1rem; margin-top: 10px; }
        .btn-main:hover { filter: brightness(1.2); }

        /* Statistics */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-box h3 { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
        .stat-box p { font-size: 1.6rem; font-weight: 900; color: var(--gold); }

        /* Tables */
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #222; padding: 15px; text-align: center; }
        th { background: #1a1a1a; color: var(--gold); font-weight: 900; }
        tr:hover { background: #1c1c1c; }
        .action-btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; margin: 2px; }
        .btn-del { background: var(--red); color: white; }
        .btn-edit { background: var(--blue); color: white; }

        /* Search */
        .search-box { margin-bottom: 20px; position: relative; }
        #search-result { margin-top: 15px; }
        .result-card { background: #000; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>لوحة تحكم OMNI الشاملة</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('add-prod')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('manage-prods')">⚙️ إدارة المتجر</button>
        <button class="tab-btn" onclick="showTab('sales-reg')">💰 تسجيل مبيعات</button>
        <button class="tab-btn" onclick="showTab('reports')">📊 التقارير</button>
        <button class="tab-btn" onclick="showTab('search')">🔍 بحث</button>
    </div>

    <div id="add-prod" class="section active">
        <div class="grid-3">
            <div class="form-group">
                <label>القسم:</label>
                <select id="p-cat">
                    <option value="steam">ستيم أوفلاين</option>
                    <option value="social">سوشيال ميديا</option>
                    <option value="apps">اشتراكات برامج</option>
                    <option value="ai">ذكاء اصطناعي</option>
                </select>
            </div>
            <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name"></div>
            <div class="form-group"><label>السعر (ريال):</label><input type="number" id="p-price"></div>
        </div>
        <div class="form-group"><label>اسم الصورة (في GitHub):</label><input type="text" id="p-img" placeholder="مثال: product1.png"></div>
        <div class="form-group"><label>الوصف الكامل:</label><textarea id="p-desc" rows="4"></textarea></div>
        <button class="btn-main" onclick="saveProduct()">🚀 نشر المنتج فوراً</button>
    </div>

    <div id="manage-prods" class="section">
        <div id="edit-box" style="display:none; margin-bottom: 30px; border: 2px solid var(--blue); padding: 20px; border-radius: 15px;">
            <h3 style="color:var(--blue)">تعديل المنتج</h3>
            <input type="hidden" id="edit-id">
            <div class="grid-3">
                <input type="text" id="edit-name" placeholder="الاسم">
                <input type="number" id="edit-price" placeholder="السعر">
                <input type="text" id="edit-img" placeholder="اسم الصورة">
            </div>
            <textarea id="edit-desc" rows="3" style="margin-top:10px" placeholder="الوصف"></textarea>
            <button class="btn-main" style="background:var(--blue); color:white" onclick="updateProduct()">تأكيد التعديل</button>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>المنتج</th><th>القسم</th><th>السعر</th><th>التحكم</th></tr></thead>
                <tbody id="prod-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="sales-reg" class="section">
        <div class="grid-3">
            <div class="form-group"><label>رمز الطلب (#):</label><input type="text" id="s-id"></div>
            <div class="form-group"><label>اسم المنتج:</label><input type="text" id="s-name"></div>
            <div class="form-group"><label>التكلفة علينا:</label><input type="number" id="s-cost"></div>
        </div>
        <div class="grid-3">
            <div class="form-group"><label>سعر البيع:</label><input type="number" id="s-price"></div>
            <div class="form-group"><label>تاريخ اليوم:</label><input type="date" id="s-date"></div>
        </div>
        <div class="form-group"><label>بيانات العميل / ملاحظات:</label><textarea id="s-note" rows="3"></textarea></div>
        <button class="btn-main" style="background:var(--green); color:black" onclick="saveSale()">✅ تسجيل العملية</button>
    </div>

    <div id="reports" class="section">
        <div class="stats-grid">
            <div class="stat-box"><h3>إجمالي المبيعات</h3><p id="stat-rev">0</p></div>
            <div class="stat-box"><h3>إجمالي التكلفة</h3><p id="stat-cost">0</p></div>
            <div class="stat-box"><h3>صافي الربح</h3><p id="stat-profit" style="color:var(--green)">0</p></div>
        </div>
        <div class="table-container">
            <table>
                <thead><tr><th>الرمز</th><th>المنتج</th><th>الربح</th><th>التاريخ</th><th>حذف</th></tr></thead>
                <tbody id="sales-table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="search" class="section">
        <div class="search-box">
            <label>ابحث برمز الطلب:</label>
            <input type="text" id="search-input" oninput="searchOrder()" placeholder="اكتب الرمز هنا...">
        </div>
        <div id="search-result"></div>
    </div>
</div>

<script>
    // الدوال الأساسية
    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'manage-prods') renderProducts();
        if(id === 'reports') renderSales();
    }

    // إدارة المنتجات
    function saveProduct() {
        const p = {
            id: Date.now(),
            cat: document.getElementById('p-cat').value,
            name: document.getElementById('p-name').value,
            price: document.getElementById('p-price').value,
            img: document.getElementById('p-img').value,
            desc: document.getElementById('p-desc').value
        };
        if(!p.name || !p.price) return alert('عبي البيانات كاملة!');
        let prods = JSON.parse(localStorage.getItem('omni_products') || '[]');
        prods.push(p);
        localStorage.setItem('omni_products', JSON.stringify(prods));
        localStorage.setItem('omni_sync', Date.now()); // إشارة للمتجر
        alert('تم النشر بنجاح!');
        location.reload();
    }

    function renderProducts() {
        let prods = JSON.parse(localStorage.getItem('omni_products') || '[]');
        const body = document.getElementById('prod-table-body');
        body.innerHTML = prods.map((p, i) => `
            <tr>
                <td>${p.name}</td>
                <td>${p.cat}</td>
                <td>${p.price} ريال</td>
                <td>
                    <button class="action-btn btn-edit" onclick="openEdit(${i})">تعديل</button>
                    <button class="action-btn btn-del" onclick="deleteProd(${i})">حذف</button>
                </td>
            </tr>
        `).join('');
    }

    function deleteProd(i) {
        if(!confirm('متأكد تبي تحذف المنتج؟')) return;
        let prods = JSON.parse(localStorage.getItem('omni_products'));
        prods.splice(i, 1);
        localStorage.setItem('omni_products', JSON.stringify(prods));
        localStorage.setItem('omni_sync', Date.now());
        renderProducts();
    }

    function openEdit(i) {
        let prods = JSON.parse(localStorage.getItem('omni_products'));
        let p = prods[i];
        document.getElementById('edit-id').value = i;
        document.getElementById('edit-name').value = p.name;
        document.getElementById('edit-price').value = p.price;
        document.getElementById('edit-img').value = p.img;
        document.getElementById('edit-desc').value = p.desc;
        document.getElementById('edit-box').style.display = 'block';
        window.scrollTo(0,0);
    }

    function updateProduct() {
        let i = document.getElementById('edit-id').value;
        let prods = JSON.parse(localStorage.getItem('omni_products'));
        prods[i].name = document.getElementById('edit-name').value;
        prods[i].price = document.getElementById('edit-price').value;
        prods[i].img = document.getElementById('edit-img').value;
        prods[i].desc = document.getElementById('edit-desc').value;
        localStorage.setItem('omni_products', JSON.stringify(prods));
        localStorage.setItem('omni_sync', Date.now());
        alert('تم التحديث!');
        location.reload();
    }

    // إدارة المبيعات
    function saveSale() {
        const s = {
            id: document.getElementById('s-id').value,
            name: document.getElementById('s-name').value,
            cost: parseFloat(document.getElementById('s-cost').value || 0),
            price: parseFloat(document.getElementById('s-price').value || 0),
            date: document.getElementById('s-date').value,
            note: document.getElementById('s-note').value
        };
        if(!s.id || !s.name) return alert('الرمز والاسم أساسيين!');
        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        sales.push(s);
        localStorage.setItem('omni_sales', JSON.stringify(sales));
        alert('تم تسجيل البيعة!');
        showTab('reports');
    }

    function renderSales() {
        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        const body = document.getElementById('sales-table-body');
        let rev = 0, cost = 0, profit = 0;
        
        body.innerHTML = sales.map((s, i) => {
            let p = s.price - s.cost;
            rev += s.price; cost += s.cost; profit += p;
            return `<tr><td>${s.id}</td><td>${s.name}</td><td style="color:var(--green)">${p}</td><td>${s.date}</td><td><button onclick="delSale(${i})" style="color:red; background:none; border:none; cursor:pointer">✕</button></td></tr>`;
        }).join('');

        document.getElementById('stat-rev').innerText = rev + " ريال";
        document.getElementById('stat-cost').innerText = cost + " ريال";
        document.getElementById('stat-profit').innerText = profit + " ريال";
    }

    function delSale(i) {
        let sales = JSON.parse(localStorage.getItem('omni_sales'));
        sales.splice(i, 1);
        localStorage.setItem('omni_sales', JSON.stringify(sales));
        renderSales();
    }

    function searchOrder() {
        const val = document.getElementById('search-input').value;
        const res = document.getElementById('search-result');
        if(!val) return res.innerHTML = '';
        let sales = JSON.parse(localStorage.getItem('omni_sales') || '[]');
        let s = sales.find(x => x.id === val);
        if(s) {
            res.innerHTML = `
                <div class="result-card">
                    <p><b>📦 المنتج:</b> ${s.name}</p>
                    <p><b>💰 سعر البيع:</b> ${s.price} ريال</p>
                    <p><b>📅 التاريخ:</b> ${s.date}</p>
                    <p><b>📝 الملاحظات:</b> ${s.note}</p>
                </div>`;
        } else { res.innerHTML = '❌ لا يوجد سجل بهذا الرمز'; }
    }
</script>
</body>
</html>
