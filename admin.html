<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OMNI Dashboard | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <style>
        :root { --main-color: #d4af37; --bg-dark: #0a0a0a; --card-bg: #161616; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg-dark); color: white; margin: 0; }
        
        /* Sidebar Menu */
        .sidebar { width: 250px; height: 100vh; background: #000; position: fixed; border-left: 1px solid var(--main-color); padding: 20px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; }
        .nav-item:hover, .nav-item.active { background: var(--main-color); color: #000; font-weight: bold; }

        /* Main Content */
        .main-content { margin-right: 270px; padding: 30px; }
        .glass-card { background: var(--card-bg); border: 1px solid #333; border-radius: 20px; padding: 25px; margin-bottom: 20px; }

        /* Stock Arrow Effect */
        .stock-indicator { font-size: 2rem; display: flex; align-items: center; gap: 10px; }
        .up { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .down { color: #ff0000; text-shadow: 0 0 10px #ff0000; }

        /* Forms */
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; }
        button { background: var(--main-color); color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        button:hover { transform: scale(1.02); box-shadow: 0 0 15px var(--main-color); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--main-color); text-align: center;">OMNI ADMIN</h2>
    <div class="nav-item active" onclick="showSection('add-product')">➕ إضافة منتج</div>
    <div class="nav-item" onclick="showSection('sales-reg')">📑 تسجيل بيعة</div>
    <div class="nav-item" onclick="showSection('search-order')">🔍 بحث بالرمز</div>
    <div class="nav-item" onclick="showSection('stats')">📈 المبيعات والإحصائيات</div>
    <div class="nav-item" onclick="showSection('edit-products')">⚙️ تعديل المنتجات</div>
</div>

<div class="main-content">
    <div id="add-product" class="section glass-card">
        <h3>إضافة منتج جديد للمتجر</h3>
        <input type="text" id="p-name" placeholder="اسم المنتج (إلزامي)">
        <input type="text" id="p-img" placeholder="اسم الصورة في GitHub (مثال: game1.jpg)">
        <input type="number" id="p-price" placeholder="السعر الأساسي">
        <textarea id="p-desc" placeholder="وصف المنتج..."></textarea>
        <input type="text" id="p-desc-img" placeholder="رابط صورة داخل الوصف (اختياري)">
        <hr>
        <h4>خيارات إضافية (اختياري)</h4>
        <div id="options-container">
            <input type="text" placeholder="اسم الخيار (مثلاً: شهر)">
            <input type="number" placeholder="سعر الخيار">
        </div>
        <button onclick="saveProduct()">نشر المنتج في المتجر فوراً 🚀</button>
    </div>

    <div id="stats" class="section glass-card" style="display:none;">
        <h3>مؤشر أداء المتجر</h3>
        <div class="stock-indicator up">
            <span>▲</span> 15% زيادة في المبيعات اليوم
        </div>
        <canvas id="salesChart" width="400" height="150"></canvas>
    </div>
</div>

<script>
    function showSection(id) {
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    // هنا سيتم ربط الـ API الخاص بـ GitHub و Google Sheets لاحقاً
</script>
</body>
</html>
