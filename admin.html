<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم OmniStore الملكية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; padding: 20px; text-align: center; }
        .card { background: #1a1a1a; padding: 20px; border-radius: 10px; max-width: 450px; margin: auto; border: 1px solid #c7a13c; box-shadow: 0 0 15px rgba(199, 161, 60, 0.3); }
        h2 { color: #c7a13c; }
        input, select, textarea { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2d2d2d; color: white; }
        textarea { height: 80px; resize: none; }
        button { background: linear-gradient(45deg, #8a2be2, #c7a13c); color: white; border: none; padding: 15px; cursor: pointer; border-radius: 5px; width: 95%; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="card">
    <h2>إضافة منتج جديد لمتجر أومني الملكي</h2>
    <input type="text" id="pName" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط صورة المنتج">
    <textarea id="pDesc" placeholder="وصف المنتج (سيظهر للزبون)"></textarea>
    
    <label>اختر القائمة الصحيحة:</label>
    <select id="pCategory">
        <option value="cards">بطاقات وهدايا واشتراكات اخرى</option>
        <option value="social">دعم سوشل ميديا</option>
        <option value="ai">ادوات الذكاء الاصطناعي</option>
        <option value="entertainment">ترفيه بلا حدود</option>
    </select>

    <button onclick="addProduct()">حفظ المنتج في المتجر</button>
</div>

<script>
    // مفتاح الربط الخاص بك
    const firebaseConfig = {
      apiKey: "AIzaSyCWkjGbA5gZBqr60Qa98WXsyrDZQJlv07I",
      authDomain: "omnistore-a5251.firebaseapp.com",
      databaseURL: "https://omnistore-a5251-default-rtdb.firebaseio.com",
      projectId: "omnistore-a5251",
      storageBucket: "omnistore-a5251.firebasestorage.app",
      appId: "1:542087784992:web:5ed1e7ec4d4a423bc3aa45"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function addProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const img = document.getElementById('pImg').value;
        const desc = document.getElementById('pDesc').value;
        const cat = document.getElementById('pCategory').value;

        if(name && price && img && desc) {
            db.ref('products').push({
                name: name,
                price: price,
                image: img,
                description: desc,
                category: cat
            }).then(() => {
                alert("تمت الإضافة بنجاح!");
                location.reload();
            });
        } else {
            alert("يرجى ملء جميع الخانات بما فيها وصف المنتج");
        }
    }
</script>
</body>
</html>
