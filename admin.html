<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم متجر أومني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg); color: white; padding: 20px; }
        
        .admin-container { max-width: 1000px; margin: 0 auto; }
        h1 { color: var(--gold); text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab-btn { background: var(--card); border: 1px solid var(--gold); color: white; padding: 10px 20px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }
        
        .section { display: none; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .section.active { display: block; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; font-size: 1rem; }
        
        .btn-add { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #000; }
        th, td { border: 1px solid #333; padding: 12px; text-align: center; }
        th { background: var(--gold); color: black; }
        
        .stat-card { background: var(--gold); color: black; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        .delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>لوحة تحكم أومني (الداخلية)</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('products')">📦 إضافة منتج</button>
        <button class="tab-btn" onclick="showTab('orders')">📝 إضافة طلب</button>
        <button class="tab-btn" onclick="showTab('sales')">📊 جدول المبيعات</button>
    </div>

    <div id="products" class="section active">
        <h2>إضافة منتج جديد للمتجر</h2>
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="p-name" placeholder="مثلاً: يوتيوب بريميوم">
        </div>
        <div class="form-group">
            <label>اسم الصورة (بالضبط):</label>
            <input type="text" id="p-img" placeholder="مثلاً: youtube.jpeg">
        </div>
        <div class="form-group">
            <label>وصف المنتج:</label>
            <textarea id="p-desc" rows="3" placeholder="اكتب الوصف هنا..."></textarea>
        </div>
        <div class="form-group">
            <label>السعر الأساسي (أو اكتب 'اختيار'):</label>
            <input type="text" id="p-price" placeholder="12.99">
        </div>
        <button class="btn-add" onclick="saveProduct()">حفظ المنتج في القائمة</button>

        <table id="products-table">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>السعر</th>
                    <th>حذف</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="orders" class="section">
        <h2>تسجيل طلب جديد (حفظ بيانات الزبون)</h2>
        <div class="form-group">
            <label>رقم الطلب:</label>
            <input type="text" id="o-id" placeholder="مثلاً: #1001">
        </div>
        <div class="form-group">
            <label>بيانات الزبون والطلب:</label>
            <textarea id="o-data" rows="3" placeholder="الاسم، الحساب، نوع الخدمة..."></textarea>
        </div>
        <div class="form-group">
            <label>المبلغ المدفوع:</label>
            <input type="number" id="o-amount" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>تاريخ الطلب:</label>
            <input type="date" id="o-date">
        </div>
        <button class="btn-add" onclick="saveOrder()">تسجيل الطلب وحفظه</button>
    </div>

    <div id="sales" class="section">
        <div class="stat-card">
            <h3>إجمالي المبيعات</h3>
            <h2 id="total-profit">0.00 ريال</h2>
            <p>عدد العمليات: <span id="sales-count">0</span></p>
        </div>
        
        <h2>سجل العمليات المحفوظة</h2>
        <table id="sales-table">
            <thead>
                <tr>
                    <th>رقم الطلب</th>
                    <th>التاريخ</th>
                    <th>البيانات</th>
                    <th>المبلغ</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button class="btn-add" style="background:#444; color:white; margin-top:30px;" onclick="exportData()">تحميل نسخة احتياطية (Backup)</button>
    </div>
</div>

<script>
    // تبديل الأقسام
    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'sales') updateSalesTable();
        if(tabId === 'products') updateProductTable();
    }

    // إدارة المنتجات
    function saveProduct() {
        const product = {
            name: document.getElementById('p-name').value,
            img: document.getElementById('p-img').value,
            desc: document.getElementById('p-desc').value,
            price: document.getElementById('p-price').value
        };
        if(!product.name) return alert('أدخل اسم المنتج');
        
        let products = JSON.parse(localStorage.getItem('my_products') || '[]');
        products.push(product);
        localStorage.setItem('my_products', JSON.stringify(products));
        alert('تم حفظ المنتج بنجاح');
        updateProductTable();
    }

    function updateProductTable() {
        let products = JSON.parse(localStorage.getItem('my_products') || '[]');
        const tbody = document.querySelector('#products-table tbody');
        tbody.innerHTML = '';
        products.forEach((p, index) => {
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.price}</td><td><button class="delete-btn" onclick="deleteItem('my_products', ${index}, updateProductTable)">حذف</button></td></tr>`;
        });
    }

    // إدارة الطلبات والمبيعات
    function saveOrder() {
        const order = {
            id: document.getElementById('o-id').value,
            data: document.getElementById('o-data').value,
            amount: parseFloat(document.getElementById('o-amount').value || 0),
            date: document.getElementById('o-date').value
        };
        if(!order.id || !order.data) return alert('أدخل رقم الطلب والبيانات');

        let sales = JSON.parse(localStorage.getItem('my_sales') || '[]');
        sales.push(order);
        localStorage.setItem('my_sales', JSON.stringify(sales));
        alert('تم تسجيل الطلب في سجل المبيعات');
        
        // مسح الخانات بعد الحفظ
        document.getElementById('o-id').value = '';
        document.getElementById('o-data').value = '';
        document.getElementById('o-amount').value = '';
    }

    function updateSalesTable() {
        let sales = JSON.parse(localStorage.getItem('my_sales') || '[]');
        const tbody = document.querySelector('#sales-table tbody');
        tbody.innerHTML = '';
        let total = 0;

        sales.forEach((s, index) => {
            total += s.amount;
            tbody.innerHTML += `
                <tr>
                    <td>${s.id}</td>
                    <td>${s.date}</td>
                    <td style="text-align:right; font-size:0.8rem;">${s.data}</td>
                    <td>${s.amount} ريال</td>
                    <td><button class="delete-btn" onclick="deleteItem('my_sales', ${index}, updateSalesTable)">حذف</button></td>
                </tr>
            `;
        });

        document.getElementById('total-profit').innerText = total.toFixed(2) + " ريال";
        document.getElementById('sales-count').innerText = sales.length;
    }

    function deleteItem(key, index, callback) {
        if(!confirm('هل أنت متأكد من الحذف؟')) return;
        let data = JSON.parse(localStorage.getItem(key));
        data.splice(index, 1);
        localStorage.setItem(key, JSON.stringify(data));
        callback();
    }

    // تصدير البيانات كملف نصي للنسخ الاحتياطي
    function exportData() {
        const data = {
            products: localStorage.getItem('my_products'),
            sales: localStorage.getItem('my_sales')
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'backup_omni_store.json';
        a.click();
    }

    // تشغيل الجداول عند الفتح
    updateProductTable();
</script>

</body>
</html>
